<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">

<title>控房 — 兀瑪斯農莊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',-apple-system,sans-serif;--bg:#f7f5f2;--border:#e8e4de;--border2:#f0ece6;--text:#1a1a1a;--text2:#888;--text3:#bbb;--green:#2d6a4f;--green-bg:#edf5f0;--red:#b94040;--red-bg:#fdf0f0;--blue:#3a6ab0;--blue-bg:#e8f0fe;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid #e8e4de;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#login-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#login-screen.show{display:flex;}
.login-card{background:#fff;border-radius:18px;padding:44px 40px;width:360px;text-align:center;border:0.5px solid var(--border);}
.login-logo{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:0.1em;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text3);letter-spacing:0.08em;margin-bottom:28px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:0.5px solid var(--border);border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);}
.login-btn img{width:18px;}
.app{display:none;flex-direction:column;height:100vh;}
.app.ready{display:flex;}
.btn-sm{padding:4px 10px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);}

/* 日期列 */
.date-bar{background:#fff;border-bottom:0.5px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.date-title{font-family:var(--serif);font-size:13px;font-weight:400;letter-spacing:0.04em;}
.date-sub{font-size:11px;color:var(--text2);}
.alert-pill{background:#fffbe6;border:0.5px solid #f0d98a;border-radius:999px;padding:3px 10px;font-size:11px;color:#7a5c00;display:none;}
.alert-pill.show{display:block;}
.kpi-row{display:flex;gap:6px;margin-left:auto;}
.kpi{background:var(--bg);border-radius:7px;padding:4px 10px;text-align:center;}
.kpi-num{font-size:14px;font-weight:500;}
.kpi-label{font-size:9px;color:var(--text3);letter-spacing:0.03em;}

/* 看板 */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 20px;cursor:grab;user-select:none;}
.board-wrap.dragging-board{cursor:grabbing;}
.board{display:flex;gap:10px;align-items:flex-start;min-width:max-content;height:100%;}

/* 欄位 */
.col{border-radius:12px;padding:10px;width:210px;flex-shrink:0;max-height:calc(100vh - 130px);display:flex;flex-direction:column;}
.col.flow-col{background:#fff;border:0.5px solid var(--border);}
.col.room-col{background:#fafaf8;border:0.5px solid var(--border2);}
.col.room-col.occupied{background:var(--green-bg);border-color:#b5d4b8;}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;}
.col-name{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;}
.col-count{background:var(--bg);border-radius:999px;padding:1px 7px;font-size:10px;color:var(--text3);}
.col-cap{font-size:9px;color:var(--text3);}
.col-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:4px;}
.cards-area{overflow-y:auto;flex:1;}
.cards-area::-webkit-scrollbar{width:3px;}
.cards-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.drop-hint{border:1px dashed var(--border);border-radius:8px;padding:10px;text-align:center;font-size:10px;color:var(--text3);margin-bottom:6px;display:none;}
.drop-hint.active{display:block;}

/* 卡片 */
.card{background:#fff;border-radius:9px;padding:10px;margin-bottom:6px;cursor:grab;border:0.5px solid var(--border2);transition:border-color 0.1s;}
.card:hover{border-color:var(--border);}
.card.dragging{opacity:0.35;cursor:grabbing;}
.room-col .card{background:#fff;}
.card-name{font-family:var(--serif);font-size:13px;font-weight:400;letter-spacing:0.02em;margin-bottom:3px;}
.card-info{font-size:10px;color:var(--text2);margin-bottom:6px;line-height:1.6;}
.card-progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.card-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s;}
.card-steps{display:flex;flex-direction:column;gap:3px;margin-bottom:7px;}
.card-step{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);padding:3px 4px;border-radius:5px;cursor:pointer;}
.card-step:hover:not(.step-done){background:var(--bg);}
.card-step.step-done{color:var(--text3);}
.card-step.step-active{color:var(--green);font-weight:500;}
.step-circle{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;border:1px solid var(--border);color:var(--text3);}
.step-circle.done{background:var(--green);border-color:var(--green);color:#fff;}
.step-circle.active{border-color:var(--green);color:var(--green);}
.card-actions{display:flex;gap:4px;flex-wrap:wrap;}
.btn{padding:4px 10px;border:0.5px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-size:10px;cursor:pointer;}
.btn:hover{background:var(--bg);}
.btn.green{background:var(--green-bg);color:var(--green);border-color:#b5d4b8;}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text);}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:440px;max-width:100%;border:0.5px solid var(--border);}
.modal h3{font-family:var(--serif);font-size:15px;font-weight:400;margin-bottom:14px;letter-spacing:0.04em;}
.sec-label{font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin:12px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--border2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-row label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;background:#fafaf8;font-family:var(--sans);}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#888;background:#fff;}
.form-row.full{grid-column:1/-1;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.info-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:0.5px solid var(--border2);}
.info-row:last-child{border-bottom:none;}
.copy-area{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;line-height:1.9;color:var(--text);white-space:pre-wrap;margin-bottom:10px;user-select:text;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:999px;font-size:11px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:2000;white-space:nowrap;letter-spacing:0.03em;}
.toast.show{opacity:1;}
.toast.show{opacity:1;}

.bottom-nav-item.active{color:var(--text);}

.board-wrap{padding:10px 12px;}}

.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
}
/* ── 底部導覽列 ── */
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
@media(min-width:769px){}.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
@media(min-width:769px){}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e8e4de;z-index:9998;padding-bottom:env(safe-area-inset-bottom);display:block;}
.bottom-nav-inner{display:flex;overflow-x:auto;height:56px;padding:0 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item{flex:0 0 20%;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:#bbb;font-size:9px;letter-spacing:0.03em;}
.bottom-nav-item.active{color:#1a1a1a;}
.bottom-nav-icon{font-size:18px;line-height:1.2;}
@media(max-width:768px){.nav-pill{display:none!important;}body{padding-bottom:70px;}#undoBtn,#redoBtn{display:flex;font-size:11px;padding:4px 8px;}}
@media(min-width:769px){.bottom-nav{display:none;}}

header h1{font-family:var(--serif);font-size:15px;font-weight:400;letter-spacing:0.06em;color:var(--text);flex:1;}

.nav-item.active{background:#fff;color:var(--text);font-weight:500;}
.nav-item:hover:not(.active){color:var(--text);}
.user-avatar{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);}
@media(max-width:768px){.modal{width:100%!important;max-width:100%;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;overflow-y:auto;}.modal-bg{padding:0!important;align-items:flex-end!important;}}

/* ── 手機版 App 風格優化 ── */
@media(max-width:768px){

  /* Header 更緊湊 */
  header{height:44px;padding:0 14px;}
  header h1{font-size:14px;}
  #undoBtn,#redoBtn{font-size:13px;padding:6px 10px;min-width:36px;min-height:36px;}
  .btn-sm,#logoutBtn{font-size:12px;padding:6px 10px;min-height:36px;}

  /* 底部導覽列更大更好點 */
  .bottom-nav{height:64px;padding-bottom:env(safe-area-inset-bottom);}
  .bottom-nav-inner{height:64px;justify-content:space-around;padding:0;}
  .bottom-nav-item{flex:1;min-width:0;padding:6px 0;gap:3px;}
  .bottom-nav-icon{font-size:22px;}
  .bottom-nav-item span:last-child{font-size:10px;}
  .bottom-nav-item.active .bottom-nav-icon{transform:scale(1.15);}
  body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}

  /* Modal 從底部滑出，高度更合理 */
  .modal-bg{padding:0!important;align-items:flex-end!important;overflow-y:hidden!important;}
  .modal{
    width:100%!important;max-width:100%;
    border-radius:20px 20px 0 0;
    position:relative!important;
    margin:0;
    max-height:88vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:calc(env(safe-area-inset-bottom) + 16px);
  }
  .modal-bg.open{overflow-y:auto!important;}

  /* 表單元素更好點擊 */
  input,select,textarea{
    font-size:16px!important; /* 防止 iOS 自動縮放 */
    min-height:44px;
    padding:10px 12px;
    border-radius:10px;
  }
  textarea{min-height:80px;}
  .form-row label{font-size:13px;margin-bottom:4px;}
  .form-grid{gap:10px;}

  /* 按鈕更大 */
  .btn{min-height:44px;font-size:13px;padding:10px 16px;border-radius:10px;}
  .btn.primary{min-height:48px;font-size:14px;}
  .form-actions{gap:10px;padding-top:12px;}
  .form-actions .btn{flex:1;}

  /* 卡片更好點 */
  .card{padding:12px;border-radius:12px;margin-bottom:8px;}
  .card-name{font-size:14px;}

  /* 房間選擇區塊 */
  .room-select-row{padding:10px 0;}
  #f-roomtype input[type=checkbox]{width:20px;height:20px;}
  .rpax-row,.pax-row{padding:12px;}

  /* 浮動新增按鈕更大 */
  .mobile-fab{width:56px;height:56px;font-size:24px;bottom:80px;}

  /* 看板卡片 */
  .col{min-width:200px;}
}

</style>

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
window.closeModal=id=>document.getElementById(id).classList.remove('open');
function getToday(){return new Date().toISOString().slice(0,10);}
function addDays(ds,n){const d=new Date(ds+'T00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function nowTime(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});}
function isCheckinToday(b){return b.checkin===today;}
function isCheckoutToday(b){const co=b.checkout||(b.checkin&&b.nights?addDays(b.checkin,parseInt(b.nights)||1):null);return co===today;}
function isStaying(b){if(!b.checkin)return false;const co=b.checkout||(b.nights?addDays(b.checkin,parseInt(b.nights)||1):null);if(!co)return false;return b.checkin<today&&today<co;}

// 控房進度 - Firebase（跨裝置同步）
const _progCache={};

function getProgress(fid){ return _progCache[fid]||{}; }

async function loadAllProgress(fids){
  await Promise.all(fids.map(async fid=>{
    try{
      const snap=await getDoc(doc(db,'checkin_progress',fid));
      _progCache[fid]=snap.exists()?snap.data():{};
    }catch(e){ _progCache[fid]={}; }
  }));
}

async function saveProgress(fid,p){
  _progCache[fid]={...p};
  try{ await setDoc(doc(db,'checkin_progress',fid),p); }
  catch(e){ console.warn('saveProgress:',e); }
}

// 取得訂單今日在控房看板的欄位
function getCheckinCol(b,prog){
  const rooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
  // 已在某個房間
  for(const r of ROOM_COLS){if(rooms.includes(r.id)&&prog.inRoom===r.id)return r.id;}
  if(prog.paid)return'paid';
  if(prog.register||prog.rules)return'checked';
  if(prog.arrived)return'arrived';
  return'today';
}

async function render(){
  today=getToday();
  const dow=['日','一','二','三','四','五','六'];
  const d=new Date(today+'T00:00');
  document.getElementById('dateTitle').textContent=today.replace(/-/g,'/');
  document.getElementById('dateSub').textContent=`星期${dow[d.getDay()]}`;

  const todayBookings=bookings.filter(b=>{
    if(!['confirmed','week-check','checkin'].includes(b.status))return false;
    return isCheckinToday(b)||isStaying(b)||isCheckoutToday(b);
  });

  const inCount=todayBookings.filter(b=>isCheckinToday(b)).length;
  const outCount=todayBookings.filter(b=>isCheckoutToday(b)).length;
  const stayCount=todayBookings.filter(b=>isStaying(b)).length;

  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><div class="kpi-num" style="color:var(--green);">${inCount}</div><div class="kpi-label">入住</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--red);">${outCount}</div><div class="kpi-label">退房</div></div>
    <div class="kpi"><div class="kpi-num" style="color:var(--blue);">${stayCount}</div><div class="kpi-label">續住</div></div>`;

  // 提醒
  const alerts=[];
  todayBookings.forEach(b=>{
    const prog=getProgress(b.firestoreId);
    if(isCheckinToday(b)&&!prog.eta)alerts.push(`${b.name} 未確認抵達時間`);
  });
  const pill=document.getElementById('alertPill');
  if(alerts.length){pill.classList.add('show');pill.textContent='⏰ '+alerts[0];}
  else pill.classList.remove('show');

  const board=document.getElementById('board');
  board.innerHTML='';

  // 流程欄
  FLOW_COLS.forEach(col=>{
    const colBookings=todayBookings.filter(b=>{
      const prog=getProgress(b.firestoreId);
      return getCheckinCol(b,prog)===col.id;
    });

    const colEl=document.createElement('div');
    colEl.className='col flow-col';
    colEl.id='col-'+col.id;
    colEl.innerHTML=`
      <div class="col-head">
        <div style="display:flex;align-items:center;gap:5px;">
          <div class="col-dot" style="background:${col.dot};"></div>
          <span class="col-name">${col.label}</span>
        </div>
        <span class="col-count">${colBookings.length}</span>
      </div>
      <div class="drop-hint" id="hint-${col.id}">拖到這裡</div>
      <div class="cards-area" id="area-${col.id}"></div>`;
    board.appendChild(colEl);

    const area=document.getElementById(`area-${col.id}`);
    colBookings.forEach(b=>area.appendChild(makeCard(b,col.id)));

    colEl.addEventListener('dragover',e=>e.preventDefault());
    colEl.addEventListener('drop',async e=>{
      e.preventDefault();
      if(!dragId)return;
      const bk=bookings.find(x=>x.firestoreId===dragId);
      if(!bk)return;
      const prog=getProgress(dragId);
      // 更新流程欄位
      if(col.id==='arrived')prog.arrived=true;
      else if(col.id==='checked'){prog.arrived=true;prog.register=true;}
      else if(col.id==='paid'){prog.arrived=true;prog.register=true;prog.payment=true;}
      delete prog.inRoom;
      await saveProgress(dragId,prog);
      render();showToast('已移至「'+col.label+'」');
    });
  });

  // 分隔線
  const sep=document.createElement('div');
  sep.style.cssText='width:1px;background:var(--border);margin:0 4px;align-self:stretch;';
  board.appendChild(sep);

  // 房間欄（依棟分組，只顯示今日有訂單的棟）
  let lastSection='';
  ROOM_COLS.forEach(room=>{
    // 目前在這個房間的訂單
    const roomBookings=todayBookings.filter(b=>{
      const prog=getProgress(b.firestoreId);
      return prog.inRoom===room.id;
    });
    const isOccupied=roomBookings.length>0;

    // 棟標題分隔
    if(room.section!==lastSection){
      lastSection=room.section;
      const secEl=document.createElement('div');
      secEl.style.cssText='writing-mode:horizontal-tb;font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 4px 4px;flex-shrink:0;';
      secEl.textContent=room.section;
      board.appendChild(secEl);
    }

    const colEl=document.createElement('div');
    colEl.className=`col room-col${isOccupied?' occupied':''}`;
    colEl.id='col-'+room.id;
    colEl.innerHTML=`
      <div class="col-head">
        <div>
          <div class="col-name" style="font-family:var(--serif);font-size:11px;letter-spacing:0.04em;">${room.label}</div>
          <div class="col-cap">${room.cap}</div>

    board.appendChild(colEl);

    roomBookings.forEach(b=>area.appendChild(makeCard(b,room.id)));

    colEl.addEventListener('dragover',e=>e.preventDefault());

      if(!dragId)return;
      const bk=bookings.find(x=>x.firestoreId===dragId);
      if(!bk)return;
      // 拖入房間 = 帶位入房
      const prog=getProgress(dragId);
      prog.inRoom=room.id;
      prog.key=true;
      prog.key_time=nowTime();
      await saveProgress(dragId,prog);
      // 更新 Firebase 狀態為入住中
      await updateDoc(doc(db,'bookings',dragId),{status:'checkin'});
      render();showToast(`已帶位入房：${room.label}`);
    });
  });

  // 綁定拖曳
  setTimeout(()=>bindDrag(),50);
}

function makeCard(b,colId){
  const prog=getProgress(b.firestoreId);
  const isRoom=ROOM_COLS.some(r=>r.id===colId);
  const rooms=Array.isArray(b.roomtype)?b.roomtype.join('、'):(b.roomtype||'—');

  // 計算進度
  const activeSteps=isCheckoutToday(b)&&!isCheckinToday(b)?
    STEPS.filter(s=>['checkout','farewell'].includes(s.id)):
    isStaying(b)?STEPS.filter(s=>['breakfast','checkout','farewell'].includes(s.id)):STEPS;
  const doneCnt=activeSteps.filter(s=>prog[s.id]).length;
  const pct=Math.round(doneCnt/activeSteps.length*100);

  // 下一步
  const nextStep=activeSteps.find(s=>!prog[s.id]);

  // 步驟顯示（只顯示未完成的前3步）
  const pendingSteps=activeSteps.filter(s=>!prog[s.id]).slice(0,3);
  const doneSteps=activeSteps.filter(s=>prog[s.id]).slice(-2);
  const showSteps=[...doneSteps,...pendingSteps].slice(0,4);

  const card=document.createElement('div');
  card.className='card';
  card.draggable=true;
  card.dataset.fid=b.firestoreId;

  const etaStr=prog.etaTime?`⏰ 預計 ${prog.etaTime}`:'';
  const arrStr=prog.arrivedTime?`✅ 抵達 ${prog.arrivedTime}`:'';

  card.innerHTML=`
    <div class="card-name">${b.name||'—'}</div>
    <div class="card-info">${rooms} · ${b.pax||1}人<br>${fmtDate(b.checkin)}→${fmtDate(b.checkout||addDays(b.checkin,parseInt(b.nights)||1))} · ${b.nights||1}晚${etaStr?`<br>${etaStr}`:''}${arrStr?`<br>${arrStr}`:''}</div>
    <div class="card-progress"><div class="card-progress-fill" style="width:${pct}%"></div></div>
    <div class="card-steps">
      ${showSteps.map((s,i)=>{
        const done=!!prog[s.id];
        const isNext=!done&&i===doneSteps.length;
        return `<div class="card-step${done?' step-done':isNext?' step-active':''}" onclick="handleStep(event,'${b.firestoreId}','${s.id}')">
          <div class="step-circle${done?' done':isNext?' active':''}">${done?'✓':s.icon}</div>
          <span>${s.label}</span>
          ${prog[s.id+'_time']?`<span style="font-size:9px;color:var(--text3);">${prog[s.id+'_time']}</span>`:''}
        </div>`;
      }).join('')}
    </div>
    ${pct===100?`<div style="background:var(--green-bg);color:var(--green);border-radius:6px;padding:4px 8px;font-size:10px;text-align:center;margin-bottom:6px;">✓ 全部完成</div>`:''}
    <div class="card-actions">
      ${nextStep?`<button class="btn green" onclick="handleStep(event,'${b.firestoreId}','${nextStep.id}')">▶ ${nextStep.label}</button>`:''}
      ${isRoom?`<button class="btn" onclick="handleStep(event,'${b.firestoreId}','farewell')">💬 歡送</button>`:''}
    </div>`;
  return card;
}

function bindDrag(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('dragstart',()=>{
      dragId=card.dataset.fid;
      setTimeout(()=>card.classList.add('dragging'),0);
      document.querySelectorAll('.drop-hint').forEach(h=>h.classList.add('active'));
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      document.querySelectorAll('.drop-hint').forEach(h=>h.classList.remove('active'));
      dragId=null;
    });
    addTouchDrag(card);
  });
}

// 觸控拖曳
let touchClone=null,touchDragId=null;
async function addTouchDrag(card){
  let timer=null;
  card.addEventListener('touchstart',e=>{
    timer=setTimeout(()=>{
      touchDragId=card.dataset.fid;
      const rect=card.getBoundingClientRect();
      touchClone=card.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:9999;pointer-events:none;transform:scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,0.15);`;
      document.body.appendChild(touchClone);
      card.style.opacity='0.25';
      document.querySelectorAll('.drop-hint').forEach(h=>h.classList.add('active'));
      navigator.vibrate&&navigator.vibrate(30);
    },200);
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    clearTimeout(timer);
    if(!touchClone)return;
    e.preventDefault();
    const t=e.touches[0];
    touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
    touchClone.style.top=(t.clientY-50)+'px';
    document.querySelectorAll('.col').forEach(c=>c.style.background='');
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const col=el?.closest('.col');
    if(col)col.style.background='#e8f0fe';
  },{passive:false});
  card.addEventListener('touchend',async e=>{
    clearTimeout(timer);
    if(touchClone){touchClone.remove();touchClone=null;}
    card.style.opacity='';
    document.querySelectorAll('.drop-hint').forEach(h=>h.classList.remove('active'));
    document.querySelectorAll('.col').forEach(c=>c.style.background='');
    if(!touchDragId)return;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const col=el?.closest('.col');
    if(col){
      const colId=col.id.replace('col-','');
      const bk=bookings.find(x=>x.firestoreId===touchDragId);
      if(!bk){touchDragId=null;return;}
      const prog=getProgress(touchDragId);
      const isRoomCol=ROOM_COLS.some(r=>r.id===colId);
      if(isRoomCol){
        prog.inRoom=colId;prog.key=true;prog.key_time=nowTime();
        await saveProgress(touchDragId,prog);
        await updateDoc(doc(db,'bookings',touchDragId),{status:'checkin'});
        showToast(`已帶位入房：${colId}`);
      } else {
        if(colId==='arrived')prog.arrived=true;
        else if(colId==='checked'){prog.arrived=true;prog.register=true;}
        else if(colId==='paid'){prog.arrived=true;prog.register=true;prog.payment=true;}
        delete prog.inRoom;
        await saveProgress(touchDragId,prog);
        const colObj=FLOW_COLS.find(c=>c.id===colId);
        if(colObj)showToast('已移至「'+colObj.label+'」');
      }
      render();
    }
    touchDragId=null;
  });
  card.addEventListener('touchcancel',()=>{
    clearTimeout(timer);
    if(touchClone){touchClone.remove();touchClone=null;}
    card.style.opacity='';
    touchDragId=null;
    document.querySelectorAll('.drop-hint').forEach(h=>h.classList.remove('active'));
    document.querySelectorAll('.col').forEach(c=>c.style.background='');
  });
}

window.handleStep=async function(e,fid,stepId){
  e.stopPropagation();
  currentFid=fid;
  const prog=getProgress(fid);
  if(prog[stepId])return;

  if(stepId==='eta'){
    document.getElementById('eta-time').value='15:00';
    document.getElementById('etaBg').classList.add('open');
  } else if(stepId==='arrived'){
    document.getElementById('arr-time').value=nowTime();
    document.getElementById('arrBg').classList.add('open');
  } else if(stepId==='register'){
    const b=bookings.find(x=>x.firestoreId===fid);
    if(b){document.getElementById('reg-name').value=b.name||'';document.getElementById('reg-phone').value=b.phone||'';document.getElementById('reg-pax').value=b.pax||1;}
    document.getElementById('reg-agree').checked=false;
    document.getElementById('regBg').classList.add('open');
  } else if(stepId==='payment'){
    const b=bookings.find(x=>x.firestoreId===fid);
    if(b){
      document.getElementById('pay-detail').innerHTML=`
        <div class="info-row"><span style="color:var(--text2);">報價</span><span>NT$ ${(parseFloat(b.quote)||0).toLocaleString()}</span></div>
        <div class="info-row"><span style="color:var(--text2);">已付訂金</span><span style="color:var(--green);">NT$ ${(parseFloat(b.deposit)||0).toLocaleString()}</span></div>
        <div class="info-row"><span style="color:var(--text2);">應收尾款</span><span style="color:var(--red);font-weight:500;">NT$ ${(parseFloat(b.due)||0).toLocaleString()}</span></div>`;
      document.getElementById('pay-amount').value=b.due||0;
    }
    document.getElementById('payBg').classList.add('open');
  } else if(stepId==='checkout'){
    document.getElementById('co-key').checked=false;
    document.getElementById('co-room').checked=false;
    document.getElementById('co-pay').checked=false;
    document.getElementById('coBg').classList.add('open');
  } else if(stepId==='farewell'){
    const b=bookings.find(x=>x.firestoreId===fid);
    const name=b?.name||'您';
    document.getElementById('fare-text').textContent=`哈囉 ${name}，感謝您入住兀瑪斯農莊！🏡

希望這次的住宿讓您留下美好的回憶，期待下次再相見！

若方便的話，歡迎幫我們留下評價，您的支持是我們最大的動力 😊

兀瑪斯農莊
0933-237-628 伊比 ／ 0988-344-297 阿關 ／ 0936-185-753 珊妮
Line：@umas

祝您旅途愉快、平安到家！`;
    window._fareFid=fid;
    document.getElementById('fareBg').classList.add('open');
  } else {
    prog[stepId]=true;prog[stepId+'_time']=nowTime();
    await saveProgress(fid,prog);
    render();
    showToast('✓ '+STEPS.find(s=>s.id===stepId)?.label);
  }
};

window.saveReg=async()=>{
  if(!document.getElementById('reg-agree').checked){alert('請確認客人已閱讀住宿須知');return;}
  const name=document.getElementById('reg-name').value.trim();
  const idno=document.getElementById('reg-idno').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  if(!name||!idno||!phone){alert('請填寫姓名、身分證和電話');return;}
  const data={name,idno,phone,birthday:document.getElementById('reg-birth').value,address:document.getElementById('reg-addr').value,pax:document.getElementById('reg-pax').value,plate:document.getElementById('reg-plate').value,note:document.getElementById('reg-note').value,checkinDate:today,checkinTime:nowTime(),bookingId:currentFid};
  await setDoc(doc(db,'checkin_records',currentFid),data);
  const key=phone||name;
  const memoRef=doc(db,'customer_memos',key);
  const snap=await getDoc(memoRef);
  await setDoc(memoRef,{...(snap.exists()?snap.data():{}),idno,address:data.address,phone,name});
  const prog=getProgress(currentFid);
  prog.register=true;prog.register_time=nowTime();
  await saveProgress(currentFid,prog);closeModal('regBg');render();showToast('✓ 入住登記完成');
};
window.savePay=async()=>{
  const prog=getProgress(currentFid);
  prog.payment=true;prog.payMethod=document.getElementById('pay-method').value;prog.payAmount=document.getElementById('pay-amount').value;prog.payment_time=nowTime();
  await saveProgress(currentFid,prog);closeModal('payBg');render();showToast('✓ 已記錄收款');
};
window.saveCo=async()=>{

window.copyFare=async()=>{
  const text=document.getElementById('fare-text').textContent;
  navigator.clipboard.writeText(text).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
  const prog=getProgress(window._fareFid);
  prog.farewell=true;prog.farewell_time=nowTime();
  await saveProgress(window._fareFid,prog);closeModal('fareBg');render();showToast('✓ 已複製歡送訊息');
};

// 看板水平拖動
const boardWrap=document.getElementById('boardWrap');
let isDown=false,startX,scrollLeft;
boardWrap.addEventListener('mousedown',e=>{if(e.target.closest('.card'))return;isDown=true;boardWrap.classList.add('dragging-board');startX=e.pageX-boardWrap.offsetLeft;scrollLeft=boardWrap.scrollLeft;});
boardWrap.addEventListener('mouseleave',()=>{isDown=false;boardWrap.classList.remove('dragging-board');});
boardWrap.addEventListener('mouseup',()=>{isDown=false;boardWrap.classList.remove('dragging-board');});
boardWrap.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-boardWrap.offsetLeft;boardWrap.scrollLeft=scrollLeft-(x-startX)*1.5;});

document.getElementById('loginBtn').addEventListener('click',async()=>{try{await signInWithPopup(auth,provider);}catch(e){if(e.code!=='auth/popup-closed-by-user')alert('登入失敗：'+e.message);}});
document.getElementById('logoutBtn').addEventListener('click',async()=>{if(unsubscribe){unsubscribe();unsubscribe=null;}await signOut(auth);});

onAuthStateChanged(auth,user=>{
  document.getElementById('loading-screen').style.display='none';
  if(!user){document.getElementById('login-screen').classList.add('show');document.getElementById('app').classList.remove('ready');return;}
  if(!ALLOWED.includes(user.email)){document.getElementById('login-screen').classList.remove('show');document.getElementById('app').classList.remove('ready');return;}
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('app').classList.add('ready');
  document.getElementById('userAvatar').src=user.photoURL||'';
  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'bookings')),async snapshot=>{
    bookings=snapshot.docs.map(d=>{
      const b={firestoreId:d.id,...d.data()};
      if(b.checkin) b.checkin=b.checkin.toString().replace(/\//g,'-').slice(0,10);
      if(b.checkout) b.checkout=b.checkout.toString().replace(/\//g,'-').slice(0,10);
      return b;
    });
    // 載入所有今日相關訂單的進度
    const todayFids=bookings.filter(b=>isCheckinToday(b)||isStaying(b)).map(b=>b.firestoreId);
    const newFids=todayFids.filter(fid=>!_progCache[fid]);
    if(newFids.length>0) await loadAllProgress(newFids);
    render();
  });
  setInterval(render,60000);
});

// ── Undo / Redo ──
const undoStack=[], redoStack=[];
const MAX_HISTORY=30;
function updateUndoRedoBtns(){
  const uBtn=document.getElementById('undoBtn');
  const rBtn=document.getElementById('redoBtn');
  if(uBtn){uBtn.disabled=undoStack.length===0;uBtn.style.opacity=undoStack.length===0?'0.4':'1';uBtn.style.cursor=undoStack.length===0?'not-allowed':'pointer';}
  if(rBtn){rBtn.disabled=redoStack.length===0;rBtn.style.opacity=redoStack.length===0?'0.4':'1';rBtn.style.cursor=redoStack.length===0?'not-allowed':'pointer';}
}
function pushUndo(action){
  undoStack.push(action);
  if(undoStack.length>MAX_HISTORY) undoStack.shift();
  redoStack.length=0;
  updateUndoRedoBtns();
}
async function applyAction(action,direction){
  const isUndo=direction==='undo';
  function clean(obj){const o={...obj};delete o.firestoreId;return o;}
  if(action.type==='update'){
    await updateDoc(doc(db,action.col,action.fid),clean(isUndo?action.before:action.after));
  }
}
window.undoAction=async function(){
  if(!undoStack.length)return;
  const action=undoStack.pop();redoStack.push(action);
  try{await applyAction(action,'undo');showToast('↩ 已復原');}
  catch(e){undoStack.push(redoStack.pop());showToast('復原失敗：'+e.message);}
  updateUndoRedoBtns();
};
window.redoAction=async function(){
  if(!redoStack.length)return;
  const action=redoStack.pop();undoStack.push(action);
  try{await applyAction(action,'redo');showToast('↪ 已重做');}
  catch(e){redoStack.push(undoStack.pop());showToast('重做失敗：'+e.message);}
  updateUndoRedoBtns();
};
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redoAction();}
});


// ── 搖晃手機觸發 undo/redo ──
(function(){
  let lastX=0,lastY=0,lastZ=0,lastTime=0;
  let shakeCount=0,shakeTimer=null;
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;
    if(!a) return;
    const now=Date.now();
    if(now-lastTime<100) return;
    const dx=Math.abs(a.x-lastX),dy=Math.abs(a.y-lastY),dz=Math.abs(a.z-lastZ);
    if(dx+dy+dz>25){
      shakeCount++;
      clearTimeout(shakeTimer);
      shakeTimer=setTimeout(()=>{shakeCount=0;},800);
      if(shakeCount>=3){
        shakeCount=0;
        // 顯示選單
        showShakeMenu();
      }
    }
    lastX=a.x;lastY=a.y;lastZ=a.z;lastTime=now;
  });

  function showShakeMenu(){
    const existing=document.getElementById('shake-menu');
    if(existing){existing.remove();return;}
    const menu=document.createElement('div');
    menu.id='shake-menu';
    menu.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:16px;padding:16px 20px;z-index:99997;display:flex;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:shakeMenuIn 0.25s cubic-bezier(0.34,1.56,0.64,1);';
    menu.innerHTML=`
      <style>@keyframes shakeMenuIn{from{opacity:0;transform:translateX(-50%) scale(0.85)}to{opacity:1;transform:translateX(-50%) scale(1)}}</style>
      <button onclick="undoAction();document.getElementById('shake-menu')?.remove()" style="background:#2a2a2a;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">↩ 復原</button>
      <button onclick="redoAction();document.getElementById('shake-menu')?.remove()" style="background:#2a2a2a;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">↪ 重做</button>
      <button onclick="document.getElementById('shake-menu')?.remove()" style="background:transparent;color:rgba(255,255,255,0.4);border:none;padding:10px;font-size:16px;cursor:pointer;">✕</button>`;
    document.body.appendChild(menu);
    setTimeout(()=>menu.remove(),4000);
  }
})();

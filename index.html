<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂房管理看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
#loading-screen .spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-screen p{font-size:13px;color:#888;}
#login-screen{position:fixed;inset:0;background:#f0f2f5;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:20px;}
#login-screen.show{display:flex;}
.login-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;border:1px solid #e0e0e0;}
.login-logo{font-size:32px;margin-bottom:8px;}
.login-title{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.login-sub{font-size:13px;color:#888;margin-bottom:28px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:#333;}
.login-btn:hover{background:#f5f5f5;}
.login-btn img{width:20px;height:20px;}
#denied-screen{position:fixed;inset:0;background:#f0f2f5;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:20px;}
#denied-screen.show{display:flex;}
.denied-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;border:1px solid #e0e0e0;}
.denied-icon{font-size:40px;margin-bottom:12px;}
.denied-title{font-size:16px;font-weight:600;color:#c62828;margin-bottom:8px;}
.denied-sub{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6;}
.app{display:none;flex-direction:column;height:100vh;}
.app.ready{display:flex;}
header{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0;}
header h1{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#666;}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid #e0e0e0;}
.sync-status{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500;}
.sync-status.online{background:#e6f4ea;color:#1e7e34;}
.sync-status.offline{background:#fce8e6;color:#c62828;}
.sync-status.syncing{background:#e8f0fe;color:#1a73e8;}
.btn-logout{padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#666;font-size:11px;cursor:pointer;}
.btn-logout:hover{background:#fce8e6;color:#c62828;border-color:#f5c6c6;}
.toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.search-box{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;width:180px;outline:none;}
.search-box:focus{border-color:#378ADD;box-shadow:0 0 0 2px #378ADD22;}
select{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;outline:none;background:#fff;}
.sort-label{font-size:12px;color:#666;}
.btn{padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#333;font-size:12px;cursor:pointer;font-weight:500;}
.btn:hover{background:#f5f5f5;}
.btn.primary{background:#378ADD;color:#fff;border-color:#378ADD;}
.btn.primary:hover{background:#185FA5;}
.board-wrap{flex:1;overflow-x:auto;padding:16px 20px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;height:100%;}
.column{background:#ebecf0;border-radius:10px;padding:10px;width:220px;flex-shrink:0;max-height:calc(100vh - 140px);display:flex;flex-direction:column;}
.col-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.col-label{display:flex;align-items:center;gap:6px;color:#5e6c84;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-count{background:#fff;border-radius:999px;padding:1px 7px;font-size:10px;color:#5e6c84;}
.cards-area{overflow-y:auto;flex:1;}
.cards-area::-webkit-scrollbar{width:4px;}
.cards-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}
.card{background:#fff;border-radius:8px;padding:10px;margin-bottom:6px;cursor:grab;border:1px solid #e0e0e0;transition:box-shadow 0.15s;}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.card.dragging{opacity:0.4;cursor:grabbing;}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;margin-bottom:5px;font-weight:600;}
.sort-key{font-size:10px;color:#999;background:#f5f5f5;border-radius:4px;padding:1px 5px;display:inline-block;float:right;}
.card-name{font-size:13px;font-weight:600;color:#172b4d;margin-bottom:2px;clear:both;}
.card-hotel{font-size:11px;color:#5e6c84;margin-bottom:4px;}
.card-row{font-size:11px;color:#5e6c84;margin-bottom:2px;display:flex;gap:4px;}
.card-row-label{color:#aaa;flex-shrink:0;}
.card-money{display:flex;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0;}
.money-item{flex:1;text-align:center;}
.money-label{font-size:9px;color:#aaa;margin-bottom:1px;}
.money-val{font-size:11px;font-weight:600;}
.money-val.total{color:#1a73e8;}
.money-val.paid{color:#1e7e34;}
.money-val.due{color:#c62828;}
.card-actions{display:flex;gap:4px;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0;}
.icon-btn{font-size:11px;color:#888;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;}
.icon-btn:hover{background:#f0f0f0;color:#333;}
.icon-btn.del:hover{color:#c62828;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px;width:460px;max-width:100%;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;}
.section-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #f0f0f0;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.form-row label{font-size:11px;color:#666;display:block;margin-bottom:3px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;outline:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px #378ADD22;}
.form-row textarea{resize:vertical;min-height:52px;}
.form-row.full{grid-column:1/-1;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:8px 20px;border-radius:999px;font-size:12px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:2000;}
.toast.show{opacity:1;}
.drop-hint{border:2px dashed #aaa;border-radius:8px;padding:12px;text-align:center;font-size:11px;color:#aaa;margin-bottom:6px;display:none;}
.drop-hint.active{display:block;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>載入中...</p>
</div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏨</div>
    <div class="login-title">訂房管理看板</div>
    <div class="login-sub">請使用授權的 Google 帳號登入</div>
    <button class="login-btn" id="loginBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div id="denied-screen">
  <div class="denied-card">
    <div class="denied-icon">🚫</div>
    <div class="denied-title">無法存取</div>
    <div class="denied-sub">你的帳號沒有使用權限。<br>請聯絡管理員取得授權。</div>
    <button class="btn" id="logoutDeniedBtn">登出並重試</button>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>訂房管理看板</h1>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span id="userName"></span>
    </div>
    <span class="sync-status syncing" id="syncStatus">連線中...</span>
    <button class="btn-logout" id="logoutBtn">登出</button>
  </header>
  <div class="toolbar">
    <input class="search-box" type="text" placeholder="搜尋姓名、住宿、編號..." id="searchInput" oninput="filterCards()">
    <span class="sort-label">排序：</span>
    <select id="sortKey" onchange="renderAll()">
      <option value="checkin">入住日期</option>
      <option value="created">建立時間</option>
      <option value="confirm">訂單編號</option>
    </select>
    <select id="sortDir" onchange="renderAll()">
      <option value="asc">由小到大 ↑</option>
      <option value="desc">由大到小 ↓</option>
    </select>
    <button class="btn primary" onclick="openModal()">+ 新增訂房</button>
  </div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">新增訂房</h3>
    <div class="section-label">客戶資訊</div>
    <div class="form-grid">
      <div class="form-row"><label>姓名 *</label><input id="f-name" placeholder="例：張欣如"></div>
      <div class="form-row"><label>電話</label><input id="f-phone" placeholder="0933-000-000"></div>
      <div class="form-row"><label>Line ID</label><input id="f-line" placeholder="Line 帳號"></div>
      <div class="form-row"><label>Facebook</label><input id="f-fb" placeholder="FB 名稱"></div>
    </div>
    <div class="section-label">訂房資訊</div>
    <div class="form-grid">
      <div class="form-row"><label>住宿名稱 / 地點</label><input id="f-hotel" placeholder="例：山林小屋"></div>
      <div class="form-row"><label>狀態</label><select id="f-status"></select></div>
      <div class="form-row"><label>訂房平台</label><input id="f-platform" placeholder="Booking、Agoda..."></div>
      <div class="form-row"><label>Booking 訂單編號</label><input id="f-confirm" placeholder="BK-001"></div>
      <div class="form-row"><label>入住日期 *</label><input id="f-checkin" type="date"></div>
      <div class="form-row"><label>住宿天數</label><input id="f-nights" type="number" min="1" placeholder="1"></div>
      <div class="form-row"><label>人數</label><input id="f-pax" type="number" min="1" placeholder="3"></div>
      <div class="form-row"><label>訪客類型</label><input id="f-guesttype" placeholder="登山、觀光..."></div>
      <div class="form-row full"><label>預定房型</label><input id="f-roomtype" placeholder="例：B-201 四人通舖"></div>
    </div>
    <div class="section-label">用餐 / 活動</div>
    <div class="form-grid col3">
      <div class="form-row"><label>用餐類型</label><input id="f-meal" placeholder="早餐、半膳..."></div>
      <div class="form-row"><label>用餐人數</label><input id="f-mealpax" type="number" min="0" placeholder="0"></div>
      <div class="form-row"><label>特殊需求</label><input id="f-special" placeholder="素食、過敏..."></div>
      <div class="form-row"><label>額外服務</label><input id="f-extra" placeholder="接駁、租借..."></div>
      <div class="form-row"><label>合作社活動</label><input id="f-activity" placeholder="活動名稱"></div>
      <div class="form-row"><label>參加人數</label><input id="f-actpax" type="number" min="0" placeholder="0"></div>
    </div>
    <div class="section-label">費用</div>
    <div class="form-grid col3">
      <div class="form-row"><label>報價金額 (NT$)</label><input id="f-quote" type="number" placeholder="1500" oninput="calcDue()"></div>
      <div class="form-row"><label>已付訂金 (NT$)</label><input id="f-deposit" type="number" placeholder="450" oninput="calcDue()"></div>
      <div class="form-row"><label>應收尾款 (NT$)</label><input id="f-due" type="number" readonly style="background:#f9f9f9;color:#888;"></div>
    </div>
    <div class="section-label">備註</div>
    <div class="form-row"><textarea id="f-note" placeholder="其他備註事項..."></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" id="saveBtn" onclick="saveBooking()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAedMeGyuaKI7QJVe3vDAHazyp6SX1ouFw",
  authDomain: "umas-booking-manager.firebaseapp.com",
  projectId: "umas-booking-manager",
  storageBucket: "umas-booking-manager.firebasestorage.app",
  messagingSenderId: "7381346891",
  appId: "1:7381346891:web:2affb529e6b8614f6b7bce"
};

const ALLOWED_EMAILS = [
  "key8745@gmail.com",
  "princessangel45@gmail.com"
];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const COLS=[{id:'new-case',label:'新接案',dot:'#7F77DD'},{id:'platform',label:'訂房平台',dot:'#378ADD'},{id:'pending',label:'暫時保留待確認',dot:'#EF9F27'},{id:'confirmed',label:'確認接訂',dot:'#1D9E75'},{id:'week-check',label:'一周前確認',dot:'#5DCAA5'},{id:'checkin',label:'入住中',dot:'#639922'},{id:'delayed',label:'延期',dot:'#D85A30'},{id:'no-show',label:'未到取消',dot:'#E24B4A'},{id:'closed',label:'已結案',dot:'#888780'},{id:'unpaid',label:'未收款',dot:'#BA7517'}];
const TAG={'new-case':'background:#EEEDFE;color:#3C3489','platform':'background:#E6F1FB;color:#0C447C','pending':'background:#FAEEDA;color:#633806','confirmed':'background:#E1F5EE;color:#085041','week-check':'background:#E1F5EE;color:#0F6E56','checkin':'background:#EAF3DE;color:#27500A','delayed':'background:#FAECE7;color:#712B13','no-show':'background:#FCEBEB;color:#791F1F','closed':'background:#F1EFE8;color:#444441','unpaid':'background:#FAEEDA;color:#854F0B'};

let bookings=[],editId=null,dragId=null,searchQ='',unsubscribe=null;

window.filterCards=()=>{searchQ=document.getElementById('searchInput').value;renderAll();};
window.calcDue=()=>{const q=parseFloat(document.getElementById('f-quote').value)||0,d=parseFloat(document.getElementById('f-deposit').value)||0;document.getElementById('f-due').value=Math.round(q-d)||'';};

function getSortKey(){return document.getElementById('sortKey').value;}
function getSortDir(){return document.getElementById('sortDir').value;}
function sortVal(b,key){if(key==='checkin')return b.checkin||'9999';if(key==='created')return b.createdAt?.seconds||0;if(key==='confirm')return b.confirm||'\uFFFF';return 0;}
function sorted(list){const k=getSortKey(),d=getSortDir();return[...list].sort((a,b)=>{const va=sortVal(a,k),vb=sortVal(b,k);return va<vb?(d==='asc'?-1:1):va>vb?(d==='asc'?1:-1):0;});}
function sortKeyLabel(b){const k=getSortKey();if(k==='checkin')return b.checkin||'—';if(k==='created')return b.createdAt?new Date(b.createdAt.seconds*1000).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}):'—';if(k==='confirm')return b.confirm||'無編號';return'';}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00').toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});}
function coDate(ci,n){if(!ci||!n)return'';const d=new Date(ci+'T00:00');d.setDate(d.getDate()+parseInt(n));return fmtDate(d.toISOString().slice(0,10));}
function matchSearch(b){if(!searchQ)return true;return(b.name+b.hotel+b.confirm+b.phone+b.roomtype+b.guesttype).toLowerCase().includes(searchQ.toLowerCase());}

function cardHTML(b){const col=COLS.find(c=>c.id===b.status),ts=TAG[b.status]||'',cout=coDate(b.checkin,b.nights),skl=sortKeyLabel(b);
return`<div class="card" id="card-${b.firestoreId}" draggable="true"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><span class="tag" style="${ts}">${col?col.label:b.status}</span><span class="sort-key">${skl}</span></div><div class="card-name">${b.name||''}${b.pax>1?' ('+b.pax+'位)':''}</div><div class="card-hotel">${b.hotel||''}${b.roomtype?' · '+b.roomtype:''}</div>${b.checkin?`<div class="card-row"><span class="card-row-label">日期</span>${fmtDate(b.checkin)}${cout?' → '+cout:''} · ${b.nights||1}晚</div>`:''}${b.guesttype?`<div class="card-row"><span class="card-row-label">類型</span>${b.guesttype}</div>`:''}${b.platform?`<div class="card-row"><span class="card-row-label">平台</span>${b.platform}</div>`:''}${b.confirm?`<div class="card-row"><span class="card-row-label">編號</span>${b.confirm}</div>`:''}${b.meal?`<div class="card-row"><span class="card-row-label">用餐</span>${b.meal}${b.mealpax?' · '+b.mealpax+'人':''}</div>`:''}${b.activity?`<div class="card-row"><span class="card-row-label">活動</span>${b.activity}${b.actpax?' · '+b.actpax+'人':''}</div>`:''}${b.special||b.extra?`<div class="card-row"><span class="card-row-label">備註</span>${[b.special,b.extra].filter(Boolean).join('、')}</div>`:''}${b.quote?`<div class="card-money"><div class="money-item"><div class="money-label">報價</div><div class="money-val total">NT$${Number(b.quote).toLocaleString()}</div></div><div class="money-item"><div class="money-label">已付</div><div class="money-val paid">NT$${Number(b.deposit||0).toLocaleString()}</div></div><div class="money-item"><div class="money-label">尾款</div><div class="money-val due">NT$${Number(b.due||0).toLocaleString()}</div></div></div>`:''}<div class="card-actions"><button class="icon-btn" onclick="editBooking('${b.firestoreId}')">✏ 編輯</button><button class="icon-btn del" onclick="deleteBooking('${b.firestoreId}','${(b.name||'').replace(/'/g,'')}')">✕ 刪除</button></div></div>`;}


let touchClone=null, touchDragId=null, touchMoved=false;

function addTouchDrag(card, fid){
  let longPressTimer=null;

  card.addEventListener('touchstart', e=>{
    touchMoved=false;
    longPressTimer=setTimeout(()=>{
      touchDragId=fid;
      const rect=card.getBoundingClientRect();
      touchClone=card.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.75;z-index:9999;pointer-events:none;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);`;
      document.body.appendChild(touchClone);
      card.style.opacity='0.3';
      COLS.forEach(c=>{const h=document.getElementById('hint-'+c.id);if(h)h.classList.add('active');});
      navigator.vibrate&&navigator.vibrate(40);
    }, 350);
  },{passive:true});

  card.addEventListener('touchmove', e=>{
    touchMoved=true;
    clearTimeout(longPressTimer);
    if(!touchClone||!touchDragId) return;
    e.preventDefault();
    const t=e.touches[0];
    touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
    touchClone.style.top=(t.clientY-30)+'px';
    const els=document.elementsFromPoint(t.clientX,t.clientY);
    document.querySelectorAll('.column').forEach(c=>c.style.background='');
    const col=els.find(el=>el.classList.contains('column')||el.closest('.column'));
    const colEl=col?.classList.contains('column')?col:col?.closest('.column');
    if(colEl) colEl.style.background='#dce8f8';
  },{passive:false});

  card.addEventListener('touchend', async e=>{
    clearTimeout(longPressTimer);
    if(touchClone){ touchClone.remove(); touchClone=null; }
    card.style.opacity='';
    COLS.forEach(c=>{const h=document.getElementById('hint-'+c.id);if(h)h.classList.remove('active');});
    document.querySelectorAll('.column').forEach(c=>c.style.background='');
    if(!touchDragId){ return; }
    const t=e.changedTouches[0];
    const els=document.elementsFromPoint(t.clientX,t.clientY);
    const colEl=els.find(el=>el.classList.contains('column'))||els.map(el=>el.closest('.column')).find(Boolean);
    if(colEl){
      const targetColId=colEl.id.replace('col-','');
      const bk=bookings.find(x=>x.firestoreId===touchDragId);
      if(bk&&bk.status!==targetColId){
        await updateDoc(doc(db,'bookings',touchDragId),{status:targetColId});
        const colObj=COLS.find(c=>c.id===targetColId);
        showToast('已移至「'+(colObj?.label||targetColId)+'」');
      }
    }
    touchDragId=null;
  });

  card.addEventListener('touchcancel',()=>{
    clearTimeout(longPressTimer);
    if(touchClone){touchClone.remove();touchClone=null;}
    card.style.opacity='';
    touchDragId=null;
    COLS.forEach(c=>{const h=document.getElementById('hint-'+c.id);if(h)h.classList.remove('active');});
    document.querySelectorAll('.column').forEach(c=>c.style.background='');
  });
}

window.renderAll=function(){const board=document.getElementById('board');board.innerHTML='';COLS.forEach(col=>{const raw=bookings.filter(b=>b.status===col.id&&matchSearch(b)),list=sorted(raw),colEl=document.createElement('div');colEl.className='column';colEl.id='col-'+col.id;colEl.innerHTML=`<div class="col-header"><div class="col-label"><div class="col-dot" style="background:${col.dot}"></div><span>${col.label}</span></div><span class="col-count">${list.length}</span></div><div class="drop-hint" id="hint-${col.id}">拖到這裡</div><div class="cards-area" id="area-${col.id}"></div>`;board.appendChild(colEl);const area=document.getElementById('area-'+col.id);list.forEach(b=>{const tmp=document.createElement('div');tmp.innerHTML=cardHTML(b);const card=tmp.firstChild;card.addEventListener('dragstart',()=>{dragId=b.firestoreId;setTimeout(()=>card.classList.add('dragging'),0);COLS.forEach(c=>{const h=document.getElementById('hint-'+c.id);if(h)h.classList.add('active');});});card.addEventListener('dragend',()=>{card.classList.remove('dragging');COLS.forEach(c=>{const h=document.getElementById('hint-'+c.id);if(h)h.classList.remove('active');});dragId=null;});addTouchDrag(card,b.firestoreId);area.appendChild(card);});colEl.addEventListener('dragover',e=>e.preventDefault());colEl.addEventListener('drop',async e=>{e.preventDefault();if(!dragId)return;const bk=bookings.find(x=>x.firestoreId===dragId);if(bk&&bk.status!==col.id){await updateDoc(doc(db,'bookings',dragId),{status:col.id});showToast('已移至「'+col.label+'」');}});});};

function populateStatus(cur){document.getElementById('f-status').innerHTML=COLS.map(c=>`<option value="${c.id}"${c.id===cur?' selected':''}>${c.label}</option>`).join('');}
function setF(id,val){const el=document.getElementById(id);if(el)el.value=val===undefined||val===null?'':val;}

window.openModal=function(pre){editId=pre?pre.firestoreId:null;document.getElementById('modalTitle').textContent=editId?'編輯訂房':'新增訂房';setF('f-name',pre?.name);setF('f-phone',pre?.phone);setF('f-line',pre?.line);setF('f-fb',pre?.fb);setF('f-hotel',pre?.hotel);setF('f-platform',pre?.platform);setF('f-confirm',pre?.confirm);setF('f-checkin',pre?.checkin);setF('f-nights',pre?.nights||1);setF('f-pax',pre?.pax||1);setF('f-guesttype',pre?.guesttype);setF('f-roomtype',pre?.roomtype);setF('f-meal',pre?.meal);setF('f-mealpax',pre?.mealpax||0);setF('f-special',pre?.special);setF('f-extra',pre?.extra);setF('f-activity',pre?.activity);setF('f-actpax',pre?.actpax||0);setF('f-quote',pre?.quote);setF('f-deposit',pre?.deposit);setF('f-due',pre?.due);setF('f-note',pre?.note);populateStatus(pre?.status||'new-case');document.getElementById('modalBg').classList.add('open');};
window.closeModal=function(){document.getElementById('modalBg').classList.remove('open');};

window.saveBooking=async function(){const name=document.getElementById('f-name').value.trim(),checkin=document.getElementById('f-checkin').value;if(!name||!checkin){alert('請填寫姓名和入住日期');return;}const q=parseFloat(document.getElementById('f-quote').value)||0,dep=parseFloat(document.getElementById('f-deposit').value)||0,data={name,phone:document.getElementById('f-phone').value,line:document.getElementById('f-line').value,fb:document.getElementById('f-fb').value,hotel:document.getElementById('f-hotel').value,platform:document.getElementById('f-platform').value,confirm:document.getElementById('f-confirm').value,checkin,nights:parseInt(document.getElementById('f-nights').value)||1,pax:parseInt(document.getElementById('f-pax').value)||1,guesttype:document.getElementById('f-guesttype').value,roomtype:document.getElementById('f-roomtype').value,meal:document.getElementById('f-meal').value,mealpax:parseInt(document.getElementById('f-mealpax').value)||0,special:document.getElementById('f-special').value,extra:document.getElementById('f-extra').value,activity:document.getElementById('f-activity').value,actpax:parseInt(document.getElementById('f-actpax').value)||0,quote:q,deposit:dep,due:Math.round(q-dep),note:document.getElementById('f-note').value,status:document.getElementById('f-status').value};const saveBtn=document.getElementById('saveBtn');saveBtn.textContent='儲存中...';saveBtn.disabled=true;try{if(editId){await updateDoc(doc(db,'bookings',editId),data);showToast('已更新');}else{data.createdAt=serverTimestamp();await addDoc(collection(db,'bookings'),data);showToast('已新增並同步');}closeModal();}catch(e){alert('儲存失敗：'+e.message);}saveBtn.textContent='儲存';saveBtn.disabled=false;};

window.editBooking=function(fid){const b=bookings.find(x=>x.firestoreId===fid);if(b)openModal(b);};
window.deleteBooking=async function(fid,name){if(!confirm(`確定要刪除「${name}」的訂房嗎？`))return;await deleteDoc(doc(db,'bookings',fid));showToast('已刪除');};

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncStatus(s){const el=document.getElementById('syncStatus');if(s==='online'){el.textContent='● 即時同步';el.className='sync-status online';}else if(s==='offline'){el.textContent='● 離線';el.className='sync-status offline';}else{el.textContent='◌ 連線中...';el.className='sync-status syncing';}}

function startListening(){
  if(unsubscribe) unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'bookings')),snapshot=>{
    bookings=snapshot.docs.map(d=>({firestoreId:d.id,...d.data()}));
    renderAll();setSyncStatus('online');
  },()=>setSyncStatus('offline'));
}

document.getElementById('loginBtn').addEventListener('click',async()=>{
  try{ await signInWithPopup(auth,provider); }
  catch(e){ if(e.code!=='auth/popup-closed-by-user') alert('登入失敗：'+e.message); }
});

async function doLogout(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  await signOut(auth);
}
document.getElementById('logoutBtn').addEventListener('click',doLogout);
document.getElementById('logoutDeniedBtn').addEventListener('click',doLogout);

onAuthStateChanged(auth, user=>{
  document.getElementById('loading-screen').style.display='none';
  if(!user){
    document.getElementById('login-screen').classList.add('show');
    document.getElementById('denied-screen').classList.remove('show');
    document.getElementById('app').classList.remove('ready');
    return;
  }
  if(!ALLOWED_EMAILS.includes(user.email)){
    document.getElementById('login-screen').classList.remove('show');
    document.getElementById('denied-screen').classList.add('show');
    document.getElementById('app').classList.remove('ready');
    return;
  }
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('denied-screen').classList.remove('show');
  document.getElementById('app').classList.add('ready');
  document.getElementById('userAvatar').src=user.photoURL||'';
  document.getElementById('userName').textContent=user.displayName||user.email;
  startListening();
});
</script>
</body>
</html>

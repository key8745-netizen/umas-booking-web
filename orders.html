<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單資料 — 兀瑪斯農莊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',-apple-system,sans-serif;--bg:#f7f5f2;--border:#e8e4de;--border2:#f0ece6;--text:#1a1a1a;--text2:#888;--text3:#bbb;--green:#2d6a4f;--green-bg:#edf5f0;--red:#b94040;--red-bg:#fdf0f0;--blue:#3a6ab0;--blue-bg:#e8f0fe;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid #e8e4de;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#login-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#login-screen.show{display:flex;}
.login-card{background:#fff;border-radius:18px;padding:44px 40px;width:360px;text-align:center;border:0.5px solid var(--border);}
.login-logo{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:0.1em;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:0.5px solid var(--border);border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);}
.login-btn img{width:18px;}
.app{display:none;flex-direction:column;min-height:100vh;}
.app.ready{display:flex;}
.nav-pill::-webkit-scrollbar{display:none;}
.btn-sm{padding:4px 10px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);}
.content{padding:20px 20px 80px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.kpi-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:12px 16px;}
.kpi-label{font-size:10px;color:var(--text3);letter-spacing:0.04em;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:500;}

/* 工具列 */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-box{padding:7px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;background:#fff;flex:1;min-width:160px;}
.search-box:focus{border-color:#888;}
select.filter{padding:6px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;background:#fff;color:var(--text);}
.btn{padding:6px 14px;border:0.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);font-size:12px;cursor:pointer;}
.btn:hover{background:var(--bg);}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn.primary:hover{background:#333;}

/* 表格 */
.table-wrap{background:#fff;border-radius:12px;border:0.5px solid var(--border);overflow:hidden;}
.table-.table-row{display:grid;grid-template-columns:var(--cols);padding:10px 14px;border-bottom:0.5px solid var(--border2);align-items:center;cursor:pointer;transition:background 0.1s;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:#fafaf8;}
.cell-name{font-family:var(--serif);font-size:13px;font-weight:400;}
.cell-date{font-size:11px;color:var(--text2);}
.cell-room{font-size:11px;color:var(--text2);}
.cell-amount{font-size:12px;font-weight:500;}
.cell-due{font-size:12px;font-weight:500;}
.status-tag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;white-space:nowrap;}
.cell-actions{display:flex;gap:4px;}
.icon-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;}
.icon-btn:hover{background:var(--bg);color:var(--text);}

/* 未收款區 */
.unpaid-section{margin-top:24px;}
.section-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.unpaid-card{background:#fff;border:0.5px solid #e8c8c8;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.unpaid-name{font-family:var(--serif);font-size:13px;font-weight:400;}
.unpaid-info{font-size:11px;color:var(--text2);margin-top:2px;}
.unpaid-amount{font-size:14px;font-weight:500;color:var(--red);}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:480px;max-width:100%;border:0.5px solid var(--border);}
.modal h3{font-family:var(--serif);font-size:15px;font-weight:400;margin-bottom:14px;letter-spacing:0.04em;}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:0.5px solid var(--border2);}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text2);}
.detail-val{font-weight:500;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:999px;font-size:11px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:2000;white-space:nowrap;letter-spacing:0.03em;}
.toast.show{opacity:1;}
.toast.show{opacity:1;}

/* 底部導覽 */

.bottom-nav-inner::-webkit-scrollbar{display:none;}

.bottom-nav-item.active{color:var(--text);}

@media(max-width:768px){
  .nav-pill{display:none!important;}
  
  body{padding-bottom:70px;}
  .content{padding:14px 14px 80px;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .table-header,.table-row{grid-template-columns:1fr 80px 60px!important;}
  .hide-mobile{display:none!important;}
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
}
/* ── 底部導覽列 ── */
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
@media(min-width:769px){}.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item.active{color:#1a1a1a;}
@media(min-width:769px){}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e8e4de;z-index:9998;padding-bottom:env(safe-area-inset-bottom);display:block;}
.bottom-nav-inner{display:flex;overflow-x:auto;height:56px;padding:0 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item{flex:0 0 20%;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:#bbb;font-size:9px;letter-spacing:0.03em;}
.bottom-nav-item.active{color:#1a1a1a;}
.bottom-nav-icon{font-size:18px;line-height:1.2;}
@media(max-width:768px){.nav-pill{display:none!important;}body{padding-bottom:70px;}}
@media(min-width:769px){.bottom-nav{display:none;}}
header{background:#fff;border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;}
header h1{font-family:var(--serif);font-size:15px;font-weight:400;letter-spacing:0.06em;color:var(--text);flex:1;}
.nav-pill{display:flex;gap:1px;background:var(--bg);border-radius:8px;padding:3px;border:0.5px solid var(--border);}
.nav-item{padding:4px 12px;border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;font-weight:400;text-decoration:none;letter-spacing:0.02em;}
.nav-item.active{background:#fff;color:var(--text);font-weight:500;}
.nav-item:hover:not(.active){color:var(--text);}
.user-avatar{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);}
@media(max-width:768px){.modal{width:100%!important;max-width:100%;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;overflow-y:auto;}.modal-bg{padding:0!important;align-items:flex-end!important;}}
</style>
</head>
<body>
<div id="loading-screen"><div class="spinner"></div><p style="font-size:12px;color:#bbb;">載入中...</p></div>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">兀瑪斯農莊</div>
    <div class="login-sub">請使用授權帳號登入</div>
    <button class="login-btn" id="loginBtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">使用 Google 帳號登入</button>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>訂單資料</h1>
    <div class="nav-pill"><a href="checkin.html" class="nav-item">控房</a><a href="calendar.html" class="nav-item">日曆</a><a href="index.html" class="nav-item">主控板</a><a href="orders.html" class="nav-item active">訂單</a><a href="customers.html" class="nav-item">客戶</a><a href="analytics.html" class="nav-item">統計</a></div>
    <img class="user-avatar" id="userAvatar" src="">
    <button class="btn-sm" id="logoutBtn">登出</button>
  </header>

  <div class="content">
    <div class="kpi-row" id="kpiRow"></div>

    <div class="toolbar">
      <input class="search-box" type="text" id="searchInput" placeholder="搜尋姓名、電話、訂單號..." oninput="renderOrders()">
      <select class="filter" id="filterStatus" onchange="renderOrders()">
        <option value="">全部狀態</option>
        <option value="new-case">新接案</option>
        <option value="pending">暫時保留</option>
        <option value="confirmed">確認接訂</option>
        <option value="week-check">一周前確認</option>
        <option value="checkin">入住中</option>
        <option value="closed">已結案</option>
        <option value="unpaid">未收款</option>
        <option value="no-show">未到取消</option>
      </select>
      <select class="filter" id="filterMonth" onchange="renderOrders()">
        <option value="">全部月份</option>
      </select>
      <button class="btn" id="undoBtn" onclick="undoAction()" title="復原 Ctrl+Z" style="opacity:0.4;cursor:not-allowed;" disabled>↩ 復原</button>
      <button class="btn" id="redoBtn" onclick="redoAction()" title="重做 Ctrl+Y" style="opacity:0.4;cursor:not-allowed;" disabled>↪ 重做</button>
      <button class="btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
      <button class="btn primary" onclick="window.location.href='index.html?newOrder=1'">＋ 新增訂單</button>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="table-header" style="--cols:2fr 1fr 1fr 80px 80px 80px 60px;">
        <span>客人</span>
        <span class="hide-mobile">入住日期</span>
        <span class="hide-mobile">房型</span>
        <span>報價</span>
        <span>尾款</span>
        <span class="hide-mobile">狀態</span>
        <span></span>
      </div>
      <div id="orderList"></div>
    </div>

    <div class="unpaid-section" id="unpaidSection" style="display:none;">
      <div class="section-title">
        <span style="color:var(--red);">●</span>
        未收尾款
        <span id="unpaidTotal" style="color:var(--red);"></span>
      </div>
      <div id="unpaidList"></div>
    </div>
  </div>
</div>

<!-- 訂單詳情 Modal -->
<div class="modal-bg" id="detailBg">
  <div class="modal">
    <h3 id="detailTitle">訂單詳情</h3>
    <div id="detailContent"></div>
    <div class="form-actions">
      <button class="btn" onclick="document.getElementById('detailBg').classList.remove('open')">關閉</button>
      <button class="btn" id="detailEditBtn">✏ 編輯</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, setDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { initNotifications, generateDailyReminders } from "./notifications.js";

const firebaseConfig={apiKey:"AIzaSyAedMeGyuaKI7QJVe3vDAHazyp6SX1ouFw",authDomain:"umas-booking-manager.firebaseapp.com",projectId:"umas-booking-manager",storageBucket:"umas-booking-manager.firebasestorage.app",messagingSenderId:"7381346891",appId:"1:7381346891:web:2affb529e6b8614f6b7bce"};
const ALLOWED=["key8745@gmail.com","princessangel45@gmail.com"];
const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);
const auth=getAuth(fbApp);
const provider=new GoogleAuthProvider();

const STATUS_LABEL={'new-case':'新接案','platform':'訂房平台','pending':'暫時保留','confirmed':'確認接訂','week-check':'一周前確認','checkin':'入住中','delayed':'延期','no-show':'未到取消','closed':'已結案','unpaid':'未收款'};
const STATUS_COLOR={'new-case':'#888','pending':'#f57c00','confirmed':'#2d6a4f','week-check':'#3a6ab0','checkin':'#7b5ea7','closed':'#888','unpaid':'#b94040','no-show':'#b94040'};

let bookings=[], unsubscribe=null;

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00').toLocaleDateString('zh-TW',{year:'numeric',month:'numeric',day:'numeric'});}
function addDays(ds,n){const d=new Date(ds+'T00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

function renderKPI(){
  const total=bookings.length;
  const revenue=bookings.reduce((s,b)=>s+(parseFloat(b.quote)||0),0);
  const unpaid=bookings.reduce((s,b)=>s+(parseFloat(b.due)||0),0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthCount=bookings.filter(b=>b.checkin?.startsWith(thisMonth)).length;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">總訂單數</div><div class="kpi-val">${total}</div></div>
    <div class="kpi-card"><div class="kpi-label">總營收</div><div class="kpi-val" style="font-size:16px;">NT$${Math.round(revenue).toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">未收尾款</div><div class="kpi-val" style="font-size:16px;color:var(--red);">NT$${Math.round(unpaid).toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">本月訂單</div><div class="kpi-val">${monthCount}</div></div>`;
}

function populateMonthFilter(){
  const months=[...new Set(bookings.map(b=>b.checkin?.slice(0,7)).filter(Boolean))].sort().reverse();
  const sel=document.getElementById('filterMonth');
  const cur=sel.value;
  sel.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}

window.renderOrders=function(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const st=document.getElementById('filterStatus').value;
  const mo=document.getElementById('filterMonth').value;

  let list=bookings.filter(b=>{
    if(st&&b.status!==st)return false;
    if(mo&&!b.checkin?.startsWith(mo))return false;
    if(q&&!((b.name||'')+(b.phone||'')+(b.confirm||'')).toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>(b.checkin||'').localeCompare(a.checkin||''));

  const ol=document.getElementById('orderList');
  if(!list.length){ol.innerHTML='<div style="padding:24px;text-align:center;font-size:12px;color:var(--text3);">沒有符合條件的訂單</div>';return;}

  ol.innerHTML=list.map(b=>{
    const rooms=Array.isArray(b.roomtype)?b.roomtype.join('、'):(b.roomtype||'—');
    const co=b.checkout||(b.checkin&&b.nights?addDays(b.checkin,parseInt(b.nights)||1):null);
    const statusColor=STATUS_COLOR[b.status]||'#888';
    const due=parseFloat(b.due)||0;
    return `<div class="table-row" style="--cols:2fr 1fr 1fr 80px 80px 80px 60px;" onclick="openDetail('${b.firestoreId}')">
      <div>
        <div class="cell-name">${b.name||'—'}</div>
        <div class="cell-date" style="font-size:10px;">${b.phone||''}</div>
      </div>
      <div class="cell-date hide-mobile">${fmtDate(b.checkin)}<br>${b.nights||1}晚</div>
      <div class="cell-room hide-mobile" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${rooms}</div>
      <div class="cell-amount">NT$${(parseFloat(b.quote)||0).toLocaleString()}</div>
      <div class="cell-due" style="color:${due>0?'var(--red)':'var(--green)'};">NT$${due.toLocaleString()}</div>
      <div class="hide-mobile"><span class="status-tag" style="background:${statusColor}22;color:${statusColor};">${STATUS_LABEL[b.status]||b.status}</span></div>
      <div class="cell-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="editOrder('${b.firestoreId}')">✏</button>
        <button class="icon-btn" style="color:var(--red);" onclick="deleteOrder('${b.firestoreId}','${b.name||''}')">✕</button>
      </div>
    </div>`;
  }).join('');

  // 未收款區
  const unpaidList=bookings.filter(b=>parseFloat(b.due)>0&&['closed','checkin'].includes(b.status));
  const unpaidTotal=unpaidList.reduce((s,b)=>s+(parseFloat(b.due)||0),0);
  const us=document.getElementById('unpaidSection');
  if(unpaidList.length){
    us.style.display='block';
    document.getElementById('unpaidTotal').textContent=`合計 NT$${Math.round(unpaidTotal).toLocaleString()}`;
    document.getElementById('unpaidList').innerHTML=unpaidList.map(b=>{
      const rooms=Array.isArray(b.roomtype)?b.roomtype.join('、'):(b.roomtype||'—');
      return `<div class="unpaid-card">
        <div>
          <div class="unpaid-name">${b.name||'—'}</div>
          <div class="unpaid-info">${fmtDate(b.checkin)} · ${rooms}</div>
        </div>
        <div class="unpaid-amount">NT$${(parseFloat(b.due)||0).toLocaleString()}</div>
      </div>`;
    }).join('');
  } else us.style.display='none';
};

window.openDetail=function(fid){
  const b=bookings.find(x=>x.firestoreId===fid);
  if(!b)return;
  const rooms=Array.isArray(b.roomtype)?b.roomtype.join('、'):(b.roomtype||'—');
  const co=b.checkout||(b.checkin&&b.nights?addDays(b.checkin,parseInt(b.nights)||1):null);
  document.getElementById('detailTitle').textContent=b.name||'訂單詳情';
  document.getElementById('detailContent').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:1px;">
      ${[
        ['狀態',`<span class="status-tag" style="background:${(STATUS_COLOR[b.status]||'#888')}22;color:${STATUS_COLOR[b.status]||'#888'};">${STATUS_LABEL[b.status]||b.status}</span>`],
        ['訂房平台',b.platform||'—'],
        ['訂單編號',b.confirm||'—'],
        ['房型',rooms],
        ['人數',`${b.pax||1} 人`],
        ['入住',fmtDate(b.checkin)],
        ['退房',fmtDate(co)],
        ['住宿天數',`${b.nights||1} 晚`],
        ['方案',b.plan==='hiking'?'登山方案':'一般住宿（含早餐）'],
        ['報價',`NT$ ${(parseFloat(b.quote)||0).toLocaleString()}`],
        ['已付訂金',`<span style="color:var(--green);">NT$ ${(parseFloat(b.deposit)||0).toLocaleString()}</span>`],
        ['應收尾款',`<span style="color:${parseFloat(b.due)>0?'var(--red)':'var(--green)'};">NT$ ${(parseFloat(b.due)||0).toLocaleString()}</span>`],
        ['電話',b.phone||'—'],
        ['Line',b.line||'—'],
        ['FB',b.fb||'—'],
        ['備註',b.note||'—'],
      ].map(([l,v])=>`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`).join('')}
    </div>`;
  document.getElementById('detailEditBtn').onclick=()=>{editOrder(fid);document.getElementById('detailBg').classList.remove('open');};
  document.getElementById('detailBg').classList.add('open');
};

window.editOrder=function(fid){
  sessionStorage.setItem('editBookingId',fid);
  window.location.href='index.html?edit=1';
};

window.deleteOrder=async function(fid,name){
  if(!confirm(`確定刪除「${name}」的訂單？`))return;
  const _del=bookings.find(x=>x.firestoreId===fid);
  if(_del)pushUndo({type:'delete',col:'bookings',fid,data:{..._del}});
  await deleteDoc(doc(db,'bookings',fid));
  showToast('已刪除');
};

window.exportCSV=function(){
  const headers=['姓名','電話','Line','入住','退房','天數','人數','房型','方案','報價','訂金','尾款','狀態','備註'];
  const rows=bookings.map(b=>{
    const rooms=Array.isArray(b.roomtype)?b.roomtype.join('/'): (b.roomtype||'');
    const co=b.checkout||(b.checkin&&b.nights?addDays(b.checkin,parseInt(b.nights)||1):'');
    return [b.name,b.phone,b.line,b.checkin,co,b.nights,b.pax,rooms,b.plan==='hiking'?'登山':'一般住宿',b.quote,b.deposit,b.due,STATUS_LABEL[b.status]||b.status,b.note].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`);
  });
  const csv='\uFEFF'+[headers,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`兀瑪斯訂單_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('已匯出 CSV');
};

document.getElementById('loginBtn').addEventListener('click',async()=>{try{await signInWithPopup(auth,provider);}catch(e){if(e.code!=='auth/popup-closed-by-user')alert('登入失敗');}});
document.getElementById('logoutBtn').addEventListener('click',async()=>{if(unsubscribe){unsubscribe();unsubscribe=null;}await signOut(auth);});

onAuthStateChanged(auth,async user=>{
  document.getElementById('loading-screen').style.display='none';
  if(!user){document.getElementById('login-screen').classList.add('show');document.getElementById('app').classList.remove('ready');return;}
  if(!ALLOWED.includes(user.email)){document.getElementById('login-screen').classList.remove('show');document.getElementById('app').classList.remove('ready');return;}
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('app').classList.add('ready');
  document.getElementById('userAvatar').src=user.photoURL||'';

  // 初始化通知中心
  const addNotification=initNotifications(db);
  window.__addNotification=addNotification;

  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'bookings')),snapshot=>{
    bookings=snapshot.docs.map(d=>{
      const b={firestoreId:d.id,...d.data()};
      if(b.checkin) b.checkin=b.checkin.toString().replace(/\//g,'-').slice(0,10);
      if(b.checkout) b.checkout=b.checkout.toString().replace(/\//g,'-').slice(0,10);
      return b;
    });
    renderKPI();
    populateMonthFilter();
    renderOrders();
    generateDailyReminders(db,bookings);
  });
});

// ── Undo / Redo ──
const undoStack=[], redoStack=[];
const MAX_HISTORY=30;

function updateUndoRedoBtns(){
  const uBtn=document.getElementById('undoBtn');
  const rBtn=document.getElementById('redoBtn');
  if(uBtn){uBtn.disabled=undoStack.length===0;uBtn.style.opacity=undoStack.length===0?'0.4':'1';uBtn.style.cursor=undoStack.length===0?'not-allowed':'pointer';}
  if(rBtn){rBtn.disabled=redoStack.length===0;rBtn.style.opacity=redoStack.length===0?'0.4':'1';rBtn.style.cursor=redoStack.length===0?'not-allowed':'pointer';}
}
function pushUndo(action){
  undoStack.push(action);
  if(undoStack.length>MAX_HISTORY) undoStack.shift();
  redoStack.length=0;
  updateUndoRedoBtns();
}
async function applyAction(action,direction){
  const isUndo=direction==='undo';
  function clean(obj){const o={...obj};delete o.firestoreId;return o;}
  if(action.type==='create'){
    if(isUndo) await deleteDoc(doc(db,action.col,action.fid));
    else await setDoc(doc(db,action.col,action.fid),clean(action.data));
  } else if(action.type==='delete'){
    if(isUndo) await setDoc(doc(db,action.col,action.fid),clean(action.data));
    else await deleteDoc(doc(db,action.col,action.fid));
  } else if(action.type==='update'){
    await updateDoc(doc(db,action.col,action.fid),clean(isUndo?action.before:action.after));
  }
}
window.undoAction=async function(){
  if(!undoStack.length)return;
  const action=undoStack.pop();redoStack.push(action);
  try{await applyAction(action,'undo');showToast('↩ 已復原');}
  catch(e){undoStack.push(redoStack.pop());showToast('復原失敗：'+e.message);}
  updateUndoRedoBtns();
};
window.redoAction=async function(){
  if(!redoStack.length)return;
  const action=redoStack.pop();undoStack.push(action);
  try{await applyAction(action,'redo');showToast('↪ 已重做');}
  catch(e){redoStack.push(undoStack.pop());showToast('重做失敗：'+e.message);}
  updateUndoRedoBtns();
};
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redoAction();}
});

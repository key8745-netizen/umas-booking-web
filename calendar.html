<title>訂房日曆 — 木屋民宿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{--serif:'Noto Serif TC','Georgia',serif;--sans:'Noto Sans TC',-apple-system,'Helvetica Neue',sans-serif;--bg:#f7f5f2;--border:#e8e4de;--text:#1a1a1a;--text2:#888;--text3:#bbb;}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',-apple-system,'Helvetica Neue',sans-serif;background:#f7f5f2;color:#1a1a1a;font-size:13px;}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
#loading-screen .spinner{width:32px;height:32px;border:2px solid #e8e4de;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#login-screen{position:fixed;inset:0;background:#f0f2f5;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#login-screen.show{display:flex;}
.login-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;border:0.5px solid #e8e4de;}
.login-title{font-size:18px;font-weight:600;margin-bottom:6px;}
.login-sub{font-size:13px;color:#888;margin-bottom:24px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:#333;}
.login-btn:hover{background:#f5f5f5;}
.login-btn img{width:20px;height:20px;}
#denied-screen{position:fixed;inset:0;background:#f0f2f5;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#denied-screen.show{display:flex;}
.denied-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;border:0.5px solid #e8e4de;}

.app{display:none;flex-direction:column;height:100vh;height:100dvh;}
.app.ready{display:flex;}

.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:#666;border:1px solid transparent;}
.nav-tab.active{background:#1a1a1a;color:#fff;}
.nav-tab:hover:not(.active){background:#f0f2f5;}
.user-info{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.sync-dot.online{background:#34a853;}
.btn-sm{padding:4px 10px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);}
.btn-sm:hover{background:#f5f5f5;}

/* ── GANTT ── */
.gantt-wrap{flex:1;overflow:auto;display:none;flex-direction:column;min-height:0;}
.gantt-wrap.active{display:flex;}
.gantt-toolbar{background:#fff;border-bottom:0.5px solid #e8e4de;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.gantt-toolbar select{padding:4px 8px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;}
.gantt-toolbar button{padding:4px 12px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:12px;cursor:pointer;}
.gantt-toolbar button:hover{background:#f0f2f5;}
.month-label{font-size:13px;font-weight:600;min-width:120px;text-align:center;}
.gantt-scroll{flex:1;overflow:auto;min-height:0;}
.gantt-table{border-collapse:collapse;min-width:100%;}
.gantt-table th,.gantt-table td{border:1px solid #e8e8e8;}
.gantt-header-room{width:110px;min-width:110px;background:#f8f9fa;position:sticky;left:0;z-index:10;padding:6px 8px;font-size:11px;font-weight:600;color:#555;border-right:2px solid #ddd;}
.gantt-header-day{width:32px;min-width:32px;text-align:center;padding:4px 2px;background:#f8f9fa;font-size:10px;color:#888;position:sticky;top:0;z-index:9;}
.gantt-header-day.today{background:#e8f0fe;color:#1a73e8;font-weight:600;}
.gantt-header-day.sun{color:#e53935;}
.gantt-header-day.sat{color:#1a73e8;}
.gantt-row-label{background:#f8f9fa;position:sticky;left:0;z-index:8;padding:4px 8px;font-size:11px;border-right:2px solid #ddd;white-space:nowrap;}
.gantt-row-label .room-id{font-weight:600;color:#333;}
.gantt-row-label .room-cap{font-size:10px;color:#aaa;}
.gantt-cell{width:32px;min-width:32px;height:36px;position:relative;cursor:pointer;}
.gantt-cell.today{background:#fef9e7;}
.gantt-cell.weekend{background:#fafafa;}
.gantt-cell:hover{background:#e8f0fe22;}
.booking-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;z-index:5;transition:filter 0.1s;}
.booking-bar:hover{filter:brightness(0.92);}
.resize-handle{position:absolute;right:0;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:6;}
.section-.section-header td{background:#e9ecef;padding:4px 8px;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.05em;position:sticky;left:0;}

/* ── MONTH ── */
.month-wrap{flex:1;overflow:auto;display:none;padding:16px;}
.month-wrap.active{display:block;}
.month-grid-.month-grid-header h2{font-size:15px;font-weight:600;flex:1;}
.month-cal{background:#fff;border-radius:12px;border:0.5px solid #e8e4de;overflow:hidden;}
.month-cal-.month-cal-header div{padding:8px;text-align:center;font-size:11px;font-weight:600;color:#888;background:#f8f9fa;border-bottom:0.5px solid #e8e4de;}
.month-cal-header div:first-child{color:#e53935;}
.month-cal-header div:last-child{color:#1a73e8;}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);}
.month-day{min-height:90px;border-right:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;padding:4px;cursor:pointer;transition:background 0.1s;}
.month-day:hover{background:#f8f9fa;}
.month-day.other-month{background:#fafafa;}
.month-day.today .day-num{background:#378ADD;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.day-num{font-size:12px;font-weight:500;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.day-booking{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.day-more{font-size:10px;color:#888;padding:1px 4px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:460px;max-width:100%;}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.section-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 5px;padding-bottom:3px;border-bottom:1px solid #f0f0f0;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.form-row label{font-size:11px;color:#666;display:block;margin-bottom:2px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;}
.form-row input:focus,.form-row select:focus{border-color:#378ADD;}
.form-row textarea{resize:vertical;min-height:48px;}
.form-row.full{grid-column:1/-1;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn{padding:6px 14px;border:0.5px solid var(--border);border-radius:7px;background:#fff;color:#333;font-size:12px;cursor:pointer;font-weight:500;}
.btn:hover{background:#f5f5f5;}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn.primary:hover{background:#333;}
.btn.danger{background:#fff;color:#c62828;border-color:#f5c6c6;}
.btn.danger:hover{background:#fce8e6;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:999px;font-size:11px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:2000;white-space:nowrap;letter-spacing:0.03em;}
.toast.show{opacity:1;}
.toast.show{opacity:1;}
}

.bottom-nav-item.active{color:#1a1a1a;}

@media(max-width:768px){
  .nav-pill{display:none!important;}
  body{padding-bottom:70px;}
}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e8e4de;z-index:9998;padding-bottom:env(safe-area-inset-bottom);display:block;}
.bottom-nav-inner{display:flex;overflow-x:auto;height:56px;padding:0 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.bottom-nav-inner::-webkit-scrollbar{display:none;}
.bottom-nav-item{flex:0 0 20%;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:#bbb;font-size:9px;letter-spacing:0.03em;}
.bottom-nav-item.active{color:#1a1a1a;}
.bottom-nav-icon{font-size:18px;line-height:1.2;}
@media(min-width:769px){.bottom-nav{display:none;}}
.bottom-nav-item{flex:0 0 20%;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:#bbb;font-size:9px;letter-spacing:0.03em;}
.bottom-nav-item.active{color:#1a1a1a;}
.bottom-nav-icon{font-size:18px;line-height:1.2;}
@media(min-width:769px){.bottom-nav{display:none;}}
header{background:#fff;border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;}
header h1{font-family:var(--serif);font-size:15px;font-weight:400;letter-spacing:0.06em;color:var(--text);flex:1;}
.nav-pill{display:flex;gap:1px;background:var(--bg);border-radius:8px;padding:3px;border:0.5px solid var(--border);}
.nav-item{padding:4px 12px;border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;font-weight:400;text-decoration:none;letter-spacing:0.02em;}
.nav-item.active{background:#fff;color:var(--text);font-weight:500;}
.nav-item:hover:not(.active){color:var(--text);}
.user-avatar{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);}
@media(max-width:768px){.modal{width:100%!important;max-width:100%;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;overflow-y:auto;}.modal-bg{padding:0!important;align-items:flex-end!important;}}
</style>

<body>

<div id="loading-screen"><div class="spinner"></div><p>載入中...</p></div>

<div id="login-screen">
  <div class="login-card">
    <div style="font-family:'Noto Serif TC',serif;font-size:20px;font-weight:300;letter-spacing:0.1em;margin-bottom:4px;">兀瑪斯農莊</div>
    <div class="login-sub">請使用授權帳號登入</div>
    <button class="login-btn" id="loginBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div id="denied-screen">
  <div class="denied-card">
    <div style="font-size:36px;margin-bottom:12px;">🚫</div>
    <div style="font-size:15px;font-weight:600;color:#c62828;margin-bottom:8px;">無法存取</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px;">此帳號沒有使用權限</div>
    <button class="btn" id="logoutDeniedBtn">登出</button>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>日曆檢視</h1>
    <div class="nav-pill"><a href="checkin.html" class="nav-item">控房</a><a href="calendar.html" class="nav-item active">日曆</a><a href="index.html" class="nav-item">主控板</a><a href="orders.html" class="nav-item">訂單</a><a href="customers.html" class="nav-item">客戶</a><a href="analytics.html" class="nav-item">統計</a></div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchView('gantt')">時間軸</div>
      <div class="nav-tab" onclick="switchView('month')" id="tab-month">月曆</div>
    </div>
    <div class="user-info">
      <img class="user-avatar" id="userAvatar" src="">
      <div class="sync-dot online" id="syncDot"></div>
    </div>
    
    <button class="btn-sm" id="undoBtn" onclick="undoAction()" title="復原 Ctrl+Z" style="opacity:0.4;cursor:not-allowed;" disabled>↩</button>
    <button class="btn-sm" id="redoBtn" onclick="redoAction()" title="重做 Ctrl+Y" style="opacity:0.4;cursor:not-allowed;" disabled>↪</button>

    <button class="btn-sm" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a;" onclick="openModal()">+ 新增訂房</button>

  <!-- GANTT VIEW -->

    <div class="gantt-toolbar">
      <button onclick="shiftMonth(-1)">◀ 上個月</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="shiftMonth(1)">下個月 ▶</button>
      <button onclick="goToday()">今天</button>
    </div>
    <div class="gantt-scroll">
      <div style="position:relative;" id="ganttWrap">
        <table class="gantt-table" id="ganttTable"></table>
      </div>
    </div>
  </div>

    <div class="month-grid-header">
      <button class="btn-sm" onclick="shiftMonth(-1)">◀</button>
      <h2 id="monthTitle"></h2>
      <button class="btn-sm" onclick="shiftMonth(1)">▶</button>
      <button class="btn-sm" onclick="goToday()">今天</button>
    </div>
    <div class="month-cal">
      <div class="month-cal-header">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>

    </div>
  </div>
</div>

<!-- 調整天數確認 popup -->
<div class="modal-bg" id="adjustBg">
  <div class="modal" style="width:320px;padding:20px;">
    <div style="font-size:14px;font-weight:500;margin-bottom:6px;" id="adjust-title">調整住宿天數</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.7;" id="adjust-desc"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn" id="adjust-this-btn" style="text-align:left;padding:10px 12px;height:auto;">
        <div style="font-weight:500;font-size:12px;" id="adjust-this-label"></div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;" id="adjust-this-sub"></div>
      </button>
      <button class="btn" id="adjust-all-btn" style="text-align:left;padding:10px 12px;height:auto;background:var(--bg);">
        <div style="font-weight:500;font-size:12px;" id="adjust-all-label"></div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;" id="adjust-all-sub"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">新增訂房</h3>
    <div class="section-label">客戶資訊</div>
    <div class="form-grid">
      <div class="form-row"><label>姓名 *</label><input id="f-name" placeholder="例：張欣如"></div>
      <div class="form-row"><label>電話</label><input id="f-phone" placeholder="0933-000-000"></div>
      <div class="form-row"><label>Line ID</label><input id="f-line"></div>
      <div class="form-row"><label>Facebook</label><input id="f-fb"></div>
    </div>
    <div class="section-label">訂房資訊</div>
    <div class="form-grid">
      <div class="form-row"><label>住宿名稱</label><input id="f-hotel" value="木屋民宿"></div>
      <div class="form-row"><label>狀態</label><select id="f-status"></select></div>
      <div class="form-row"><label>訂房平台</label><input id="f-platform"></div>
      <div class="form-row"><label>訂單編號</label><input id="f-confirm"></div>
      <div class="form-row"><label>入住日期 *</label><input id="f-checkin" type="date" onchange="calOnCheckinChange()"></div>
      <div class="form-row"><label>退房日期 *</label><input id="f-checkout" type="date" onchange="calOnCheckoutChange()"></div>
      <div class="form-row"><label>住宿天數</label><input id="f-nights" type="number" min="1" value="1" onchange="calOnNightsChange()"></div>
      <div class="form-row"><label>人數</label><input id="f-pax" type="number" min="1" value="1"></div>
      <div class="form-row"><label>訪客類型</label><input id="f-guesttype"></div>
      <div class="form-row full"><label>預定房型</label><select id="f-roomtype"></select></div>
    </div>
    <div class="section-label">費用</div>

      <div class="form-row"><label>報價 (NT$)</label><input id="f-quote" type="number" oninput="calcDue()"></div>
      <div class="form-row"><label>已付訂金</label><input id="f-deposit" type="number" oninput="calcDue()"></div>
      <div class="form-row"><label>應收尾款</label><input id="f-due" type="number" readonly style="background:#f9f9f9;color:#888;"></div>

    <div class="section-label">備註</div>

      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" id="saveBtn" onclick="saveBooking()">儲存</button>
    </div>
  </div>
</div>

function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function dateStr(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDate(s){ 
  if(!s) return null;
  const norm=s.toString().replace(/\//g,'-').slice(0,10);
  const parts=norm.split('-');
  if(parts.length!==3) return null;
  // 用 Date.UTC 避免時區問題
  const d=new Date(Date.UTC(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])));
  return isNaN(d)?null:d;
}

function addDays(s,n){ 
  if(!s) return s;
  const norm=s.toString().replace(/\//g,'-').slice(0,10);
  const parts=norm.split('-');
  if(parts.length!==3) return s;
  const d=new Date(Date.UTC(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])));
  d.setUTCDate(d.getUTCDate()+n);
  const y=d.getUTCFullYear();
  const m=String(d.getUTCMonth()+1).padStart(2,'0');
  const day=String(d.getUTCDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function normDate(s){ return s?s.toString().replace(/\//g,'-').slice(0,10):''; }

function bookingOverlapsDay(b, ds){
  if(!b.checkin) return false;
  const ci=normDate(b.checkin);
  const co=normDate(b.checkout||addDays(b.checkin, parseInt(b.nights)||1));
  return ci<=ds && ds<co;
}

window.calcDue = function(){
  const q=parseFloat(document.getElementById('f-quote').value)||0;
  const d=parseFloat(document.getElementById('f-deposit').value)||0;
  document.getElementById('f-due').value=Math.round(q-d)||'';
};

function calDateAddDays(ds,n){const d=new Date(ds+'T00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function calDateDiff(a,b){return Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/86400000);}

window.calOnCheckinChange=function(){
  const ci=document.getElementById('f-checkin').value;
  const coEl=document.getElementById('f-checkout');
  const nightsEl=document.getElementById('f-nights');
  if(!ci){coEl.min='';return;}
  const minCo=calDateAddDays(ci,1);
  coEl.min=minCo;
  if(!coEl.value||coEl.value<=ci){
    coEl.value=minCo;
    nightsEl.value=1;
  } else {
    nightsEl.value=calDateDiff(ci,coEl.value);
  }
};
window.calOnCheckoutChange=function(){
  const ci=document.getElementById('f-checkin').value;
  const co=document.getElementById('f-checkout').value;
  if(!ci||!co) return;
  if(co<=ci){
    const minCo=calDateAddDays(ci,1);
    document.getElementById('f-checkout').value=minCo;
    document.getElementById('f-nights').value=1;
  } else {
    document.getElementById('f-nights').value=calDateDiff(ci,co);
  }
};
window.calOnNightsChange=function(){
  const ci=document.getElementById('f-checkin').value;
  const n=Math.max(1,parseInt(document.getElementById('f-nights').value)||1);
  document.getElementById('f-nights').value=n;
  if(ci) document.getElementById('f-checkout').value=calDateAddDays(ci,n);
};

// 房價設定（與主控板同步）
const SUITE_A_P={weekday:3000,holiday:3600,special:3960};
const SUITE_C_P={weekday:{1:1800,2:2000,3:2200},holiday:{1:2000,2:2400,3:2700},special:{1:2200,2:2600,3:2970}};
const DORM_P={weekday:528,holiday:660};
function nightDiscount2(n){ if(n===0)return 1;if(n<=2)return 0.9;if(n<=4)return 0.7;return 0.6; }
function isSpecial2(ds){const m=ds.slice(5);return['12-24','12-25','12-31','01-01','02-08','02-09','02-10'].includes(m);}
function getDateType2(ds){
  if(isSpecial2(ds)) return 'special';
  const dow=new Date(ds+'T00:00').getDay();
  return (dow===5||dow===6)?'holiday':'weekday';
}
function calcOneRoomNights(roomId, checkin, nights, pax, plan){
  let total=0;
  const info={
    'A-101':'suite_A','A-102':'suite_A','A-103':'suite_A',
    'A-201':'dorm','A-202':'dorm','A-203':'dorm',
    'B-201':'dorm','B-202':'dorm','B-203':'dorm','B-204':'dorm',
    'C-201':'suite_C','C-202':'suite_C','C-203':'suite_C'
  }[roomId]||'dorm';
  for(let n=0;n<nights;n++){
    const d=new Date(checkin+'T00:00');
    d.setDate(d.getDate()+n);
    const ds=d.toISOString().slice(0,10);
    const dt=getDateType2(ds);
    const disc=nightDiscount2(n);
    let price=0;
    if(plan==='hiking'){
      price=(info==='suite_A'||info==='suite_C')?700*pax:500*pax;
    } else if(info==='suite_A'){
      price=SUITE_A_P[dt];
    } else if(info==='suite_C'){
      const p=Math.min(pax||1,3);
      price=SUITE_C_P[dt][p]||SUITE_C_P[dt][3];
    } else {
      price=DORM_P[dt]*(pax||1);
    }
    total+=Math.round(price*disc);
  }
  return total;
}

// 計算含 roomNights 的總報價
function calcRoomNightsQuote(b, roomNights, overrideNights){
  const allRooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
  const plan=b.plan||'normal';
  const totalPax=b.pax||1;
  const paxPerRoom=Math.ceil(totalPax/allRooms.length)||1;
  let total=0;
  allRooms.forEach(rid=>{
    const n=overrideNights||(roomNights&&roomNights[rid])||b.nights||1;
    total+=calcOneRoomNights(rid,b.checkin,n,paxPerRoom,plan);
  });
  return total;
}

// 取得某房間的實際天數（考慮 roomNights）
function getRoomNights(b, roomId){
  if(b.roomNights&&b.roomNights[roomId]) return b.roomNights[roomId];
  return b.nights||1;
}

function getRoomCheckout(b, roomId){
  const nights=getRoomNights(b,roomId);
  return addDays(b.checkin,nights);
}

/* ── RENDER GANTT ── */
function renderGantt(){
  const days = daysInMonth(viewYear, viewMonth);
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('monthLabel').textContent = `${viewYear} 年 ${viewMonth+1} 月`;

  let html = '<thead><tr><th class="gantt-header-room">房間</th>';
  for(let d=1;d<=days;d++){
    const ds = dateStr(viewYear,viewMonth,d);
    const dow = new Date(ds+'T00:00').getDay();
    const isToday = ds===today;
    const cls = [isToday?'today':'', dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    html += `<th class="gantt-header-day ${cls}">${d}<br><span style="font-size:9px">${['日','一','二','三','四','五','六'][dow]}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  const roomBookings = {};
  ROOMS.forEach(r=>{ roomBookings[r.id]=[]; });
  bookings.forEach(b=>{
    const rooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
    rooms.forEach(r=>{ if(roomBookings[r]) roomBookings[r].push(b); });
  });

  let lastSection = '';
  ROOMS.forEach(room=>{
    if(room.section !== lastSection){
      lastSection = room.section;
      html += `<tr class="section-header"><td colspan="${days+1}">${room.section}</td></tr>`;
    }
    html += `<tr data-room="${room.id}">
      <td class="gantt-row-label"><div class="room-id">${room.label}</div><div class="room-cap">${room.cap}</div></td>`;
    for(let d=1;d<=days;d++){
      const ds=dateStr(viewYear,viewMonth,d);
      const dow=new Date(ds+'T00:00').getDay();
      const cls=[ds===today?'today':'',(dow===0||dow===6)?'weekend':''].filter(Boolean).join(' ');
      html+=`<td class="gantt-cell ${cls}" data-date="${ds}" data-room="${room.id}" onclick="onCellClick('${ds}','${room.id}')"></td>`;
    }
    html += '</tr>';
  });
  html += '</tbody>';

  const ganttTable = document.getElementById('ganttTable');
  const ganttWrap = document.getElementById('ganttWrap');
  ganttTable.innerHTML = html;

  window.__bmap = {};
  bookings.forEach(b=>{ window.__bmap[b.firestoreId]=b; });

  // 移除舊的 bar
  ganttWrap.querySelectorAll('.booking-bar').forEach(el=>el.remove());

  // 等 DOM 渲染完再計算格子寬度
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const firstCell = ganttTable.querySelector('td.gantt-cell');
    if(!firstCell){ return; }
    const cellRect = firstCell.getBoundingClientRect();
    const cellW = cellRect.width;
    if(!cellW){ return; }
    const labelCell = ganttTable.querySelector('.gantt-row-label');
    const labelW = labelCell ? labelCell.getBoundingClientRect().width : 100;
    const wrapRect = ganttWrap.getBoundingClientRect();
    ROOMS.forEach(room=>{
      const rbs = roomBookings[room.id]||[];
      rbs.forEach(b=>{
        if(!b.checkin){return;}
        const ciDate=parseDate(b.checkin);
        if(!ciDate||isNaN(ciDate)){return;}
        const thisRoomNights=getRoomNights(b,room.id);
        const rawCo=getRoomCheckout(b,room.id);
        const coDate=parseDate(rawCo);
        if(!coDate||isNaN(coDate)){return;}
        const monthStart=new Date(Date.UTC(viewYear,viewMonth,1));
        const nextMonth=new Date(Date.UTC(viewMonth===11?viewYear+1:viewYear,viewMonth===11?0:viewMonth+1,1));
        if(coDate<=monthStart||ciDate>=nextMonth){return;}
        const startDay=ciDate>=monthStart?ciDate.getDate():1;
        const endDay=coDate<=nextMonth?coDate.getDate()-1:daysInMonth(viewYear,viewMonth);
        if(startDay>endDay){return;}
        const rowEl=ganttTable.querySelector(`tr[data-room="${room.id}"]`);
        if(!rowEl){return;}
        const rowRect=rowEl.getBoundingClientRect();
        const top=rowRect.top - wrapRect.top;
        const rowH=rowRect.height;

        const left=labelW+(startDay-1)*cellW;
        const width=(endDay-startDay+1)*cellW;
        const color=roomColor[room.id];
        const fid=b.firestoreId;
        let displayNights=endDay-startDay+1;

        const bar=document.createElement('div');
        bar.className='booking-bar';
        bar.dataset.fid=fid;
        bar.dataset.startDay=startDay;
        bar.style.cssText=`position:absolute;left:${left}px;top:${top+3}px;width:${width}px;height:${rowH-6}px;background:${color};color:#fff;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;cursor:grab;overflow:hidden;box-sizing:border-box;z-index:10;`;
        bar.innerHTML=`<span class="bar-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;">${b.name||''}${b.pax>1?' ×'+b.pax:''}</span><span class="bar-resize" style="width:16px;height:100%;cursor:ew-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;position:absolute;right:2px;pointer-events:auto;">▎</span>`;

        // 點擊開啟編輯
        bar.querySelector('.bar-label').addEventListener('click',e=>{
          e.stopPropagation();
          openModal(window.__bmap[fid]);
        });

        // ── 拖移整個 bar（改變入住日）──
        bar.addEventListener('mousedown',async e=>{
          if(e.target.classList.contains('bar-resize')) return;
          e.preventDefault();
          const startX=e.clientX;
          const origLeft=parseFloat(bar.style.left);
          let moved=false;
          const onMove=ev=>{
            moved=true;
            const dx=ev.clientX-startX;
            const newLeft=Math.max(labelW, origLeft+dx);
            bar.style.left=newLeft+'px';
            bar.style.opacity='0.85';
            bar.style.cursor='grabbing';
          };
          const onUp=async ev=>{
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            bar.style.opacity='1';
            bar.style.cursor='grab';
            if(!moved) return;
            const finalLeft=parseFloat(bar.style.left);
            const newStartDay=Math.max(1,Math.round((finalLeft-labelW)/cellW)+1);
            const newCheckin=dateStr(viewYear,viewMonth,newStartDay);
            const newCheckout=addDays(newCheckin,displayNights);
            if(newCheckin!==b.checkin){
              pushUndo({type:'update',col:'bookings',fid,before:{checkin:b.checkin,checkout:rawCo,nights:b.nights},after:{checkin:newCheckin,checkout:newCheckout,nights:displayNights}});
              await updateDoc(doc(db,'bookings',fid),{checkin:newCheckin,checkout:newCheckout,nights:displayNights});
              showToast(`已移至 ${newCheckin}`);
            } else {
              renderGantt();
            }
          };
          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        });

        // ── 拉右邊 handle 調整天數 ──
        bar.querySelector('.bar-resize').addEventListener('mousedown',e=>{
          e.stopPropagation();e.preventDefault();
          const startX=e.clientX;
          const origW=parseFloat(bar.style.width);
          const onMove=ev=>{
            const dx=ev.clientX-startX;
            const newW=Math.max(cellW,origW+dx);
            bar.style.width=newW+'px';
            bar.style.opacity='0.85';
            displayNights=Math.max(1,Math.round(newW/cellW));
            bar.querySelector('.bar-label').textContent=`${b.name||''}${b.pax>1?' ×'+b.pax:''} (${displayNights}晚)`;
          };
          const onUp=async()=>{
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            bar.style.opacity='1';
            const origNights=endDay-startDay+1;
            if(displayNights===origNights){renderGantt();return;}
            const newCheckout=addDays(b.checkin,displayNights);

            // 找同一訂單的其他房間
            const allRooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
            const siblings=allRooms.filter(r=>r!==room.id);

            if(siblings.length===0){
              // 只有一間，直接更新
              pushUndo({type:'update',col:'bookings',fid,before:{nights:b.nights||origNights,checkout:rawCo},after:{nights:displayNights,checkout:newCheckout}});
              await updateDoc(doc(db,'bookings',fid),{nights:displayNights,checkout:newCheckout});
              showToast(`已更新為 ${displayNights} 晚`);
              return;
            }

            // 有多間房，跳出選項
            document.getElementById('adjust-title').textContent=`調整 ${room.id} 的住宿天數`;
            document.getElementById('adjust-desc').textContent=`${b.name} ${origNights}晚 → ${displayNights}晚`;
            document.getElementById('adjust-this-label').textContent=`只改 ${room.id}`;
            document.getElementById('adjust-this-sub').textContent=`${room.id} 退房改為 ${newCheckout}，其他 ${siblings.length} 間維持 ${origNights} 晚，報價重算`;
            document.getElementById('adjust-all-label').textContent=`全部 ${allRooms.length} 間一起改`;
            document.getElementById('adjust-all-sub').textContent=`所有房間退房一起改為 ${newCheckout}，報價重算`;

            document.getElementById('adjustBg').classList.add('open');

            // 只改這間：存入 roomNights，報價重算
            document.getElementById('adjust-this-btn').onclick=async()=>{
              document.getElementById('adjustBg').classList.remove('open');

              // 建立/更新 roomNights
              const roomNights={...(b.roomNights||{})};
              allRooms.forEach(r=>{ if(!roomNights[r]) roomNights[r]=origNights; });
              roomNights[room.id]=displayNights;

              // 重算報價：每間房各自的天數 × 單價
              const newQuote=calcRoomNightsQuote(b, roomNights);
              const newDue=Math.max(0,newQuote-(b.deposit||0));

              pushUndo({type:'update',col:'bookings',fid,
                before:{roomNights:b.roomNights||null,nights:b.nights,checkout:rawCo,quote:b.quote,due:b.due},
                after:{roomNights,quote:newQuote,due:newDue}
              });
              await updateDoc(doc(db,'bookings',fid),{roomNights,quote:newQuote,due:newDue});
              showToast(`${room.id} 已改為 ${displayNights} 晚，報價更新`);
            };

            // 全部一起改：清除 roomNights，統一用新天數
            document.getElementById('adjust-all-btn').onclick=async()=>{
              document.getElementById('adjustBg').classList.remove('open');
              const newQuote=calcRoomNightsQuote(b, null, displayNights);
              const newDue=Math.max(0,newQuote-(b.deposit||0));
              pushUndo({type:'update',col:'bookings',fid,
                before:{roomNights:b.roomNights||null,nights:b.nights,checkout:rawCo,quote:b.quote,due:b.due},
                after:{roomNights:null,nights:displayNights,checkout:newCheckout,quote:newQuote,due:newDue}
              });
              await updateDoc(doc(db,'bookings',fid),{roomNights:null,nights:displayNights,checkout:newCheckout,quote:newQuote,due:newDue});
              showToast(`全部 ${allRooms.length} 間已更新為 ${displayNights} 晚`);
            };
          };
          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        });

        ganttWrap.appendChild(bar);
        }catch(err){}
      });
    });
  }));
}

window.onCellClick = function(date, room){
  const existing = bookings.find(b=>{
    const rooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
    return rooms.includes(room) && bookingOverlapsDay(b,date);
  });
  if(existing){ openModal(existing); }
  else{ openModal(null, date, room); }
};

/* ── RENDER MONTH ── */
function renderMonth(){
  document.getElementById('monthTitle').textContent = `${viewYear} 年 ${viewMonth+1} 月`;
  const today = new Date().toISOString().slice(0,10);
  const firstDow = new Date(dateStr(viewYear,viewMonth,1)+'T00:00').getDay();
  const days = daysInMonth(viewYear,viewMonth);
  let html = '';
  const prevDays = daysInMonth(viewYear, viewMonth===0?11:viewMonth-1);
  for(let i=firstDow-1;i>=0;i--){
    const d = prevDays-i;
    html+=`<div class="month-day other-month"><div class="day-num" style="color:#ccc;">${d}</div></div>`;
  }
  for(let d=1;d<=days;d++){
    const ds = dateStr(viewYear,viewMonth,d);
    const isToday = ds===today;
    const dayBookings = bookings.filter(b=>bookingOverlapsDay(b,ds));
    let barsHtml = '';
    dayBookings.slice(0,3).forEach(b=>{
      const rooms=Array.isArray(b.roomtype)?b.roomtype:(b.roomtype?[b.roomtype]:[]);
      const firstRoom=rooms[0]||'';
      const color = roomColor[firstRoom]||'#888';
      const roomLabel=rooms.join('、');
      barsHtml+=`<div class="day-booking" style="background:${color}22;color:${color};border-left:3px solid ${color};" onclick="event.stopPropagation();openModal(window.__bmap['${b.firestoreId}'])">${roomLabel} ${b.name||''}</div>`;
    });
    if(dayBookings.length>3) barsHtml+=`<div class="day-more">+${dayBookings.length-3} 筆</div>`;
    html+=`<div class="month-day${isToday?' today':''}" onclick="openModal(null,'${ds}')">
      <div class="day-num">${d}</div>${barsHtml}
    </div>`;
  }
  const remaining = (7 - (firstDow+days)%7) % 7;
  for(let d=1;d<=remaining;d++){
    html+=`<div class="month-day other-month"><div class="day-num" style="color:#ccc;">${d}</div></div>`;
  }
  document.getElementById('monthDays').innerHTML = html;
  window.__bmap = {};
  bookings.forEach(b=>{ window.__bmap[b.firestoreId]=b; });
}

function render(){
  if(currentView==='gantt') renderGantt();
  else renderMonth();
}

// ── Undo / Redo ──
const undoStack=[], redoStack=[];
const MAX_HISTORY=30;

function updateUndoRedoBtns(){
  const uBtn=document.getElementById('undoBtn');
  const rBtn=document.getElementById('redoBtn');
  if(uBtn){uBtn.disabled=undoStack.length===0;uBtn.style.opacity=undoStack.length===0?'0.4':'1';uBtn.style.cursor=undoStack.length===0?'not-allowed':'pointer';}
  if(rBtn){rBtn.disabled=redoStack.length===0;rBtn.style.opacity=redoStack.length===0?'0.4':'1';rBtn.style.cursor=redoStack.length===0?'not-allowed':'pointer';}
}
function pushUndo(action){
  undoStack.push(action);
  if(undoStack.length>MAX_HISTORY) undoStack.shift();
  redoStack.length=0;
  updateUndoRedoBtns();
}
async function applyAction(action,direction){
  const isUndo=direction==='undo';
  function clean(obj){const o={...obj};delete o.firestoreId;return o;}
  if(action.type==='create'){
    if(isUndo) await deleteDoc(doc(db,action.col,action.fid));
    else await setDoc(doc(db,action.col,action.fid),clean(action.data));
  } else if(action.type==='delete'){
    if(isUndo) await setDoc(doc(db,action.col,action.fid),clean(action.data));
    else await deleteDoc(doc(db,action.col,action.fid));
  } else if(action.type==='update'){
    await updateDoc(doc(db,action.col,action.fid),clean(isUndo?action.before:action.after));
  }
}
window.undoAction=async function(){
  if(!undoStack.length)return;
  const action=undoStack.pop();redoStack.push(action);
  try{await applyAction(action,'undo');showToast('↩ 已復原');}
  catch(e){undoStack.push(redoStack.pop());showToast('復原失敗：'+e.message);}
  updateUndoRedoBtns();
};
window.redoAction=async function(){
  if(!redoStack.length)return;
  const action=redoStack.pop();undoStack.push(action);
  try{await applyAction(action,'redo');showToast('↪ 已重做');}
  catch(e){redoStack.push(undoStack.pop());showToast('重做失敗：'+e.message);}
  updateUndoRedoBtns();
};
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undoAction();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redoAction();}
});


// ── 搖晃手機觸發 undo/redo ──
(function(){
  let lastX=0,lastY=0,lastZ=0,lastTime=0;
  let shakeCount=0,shakeTimer=null;
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;
    if(!a) return;
    const now=Date.now();
    if(now-lastTime<100) return;
    const dx=Math.abs(a.x-lastX),dy=Math.abs(a.y-lastY),dz=Math.abs(a.z-lastZ);
    if(dx+dy+dz>25){
      shakeCount++;
      clearTimeout(shakeTimer);
      shakeTimer=setTimeout(()=>{shakeCount=0;},800);
      if(shakeCount>=3){
        shakeCount=0;
        // 顯示選單
        showShakeMenu();
      }
    }
    lastX=a.x;lastY=a.y;lastZ=a.z;lastTime=now;
  });

  function showShakeMenu(){
    const existing=document.getElementById('shake-menu');
    if(existing){existing.remove();return;}
    const menu=document.createElement('div');
    menu.id='shake-menu';
    menu.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:16px;padding:16px 20px;z-index:99997;display:flex;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:shakeMenuIn 0.25s cubic-bezier(0.34,1.56,0.64,1);';
    menu.innerHTML=`
      <style>@keyframes shakeMenuIn{from{opacity:0;transform:translateX(-50%) scale(0.85)}to{opacity:1;transform:translateX(-50%) scale(1)}}</style>
      <button onclick="undoAction();document.getElementById('shake-menu')?.remove()" style="background:#2a2a2a;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">↩ 復原</button>
      <button onclick="redoAction();document.getElementById('shake-menu')?.remove()" style="background:#2a2a2a;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;">↪ 重做</button>
      <button onclick="document.getElementById('shake-menu')?.remove()" style="background:transparent;color:rgba(255,255,255,0.4);border:none;padding:10px;font-size:16px;cursor:pointer;">✕</button>`;
    document.body.appendChild(menu);
    setTimeout(()=>menu.remove(),4000);
  }
})();

<html lang="zh-TW">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--serif:'Noto Serif TC','Georgia',serif;--sans:'Noto Sans TC',-apple-system,'Helvetica Neue',sans-serif;--bg:#f7f5f2;--border:#e8e4de;--border2:#f0ece6;--text:#1a1a1a;--text2:#888;--text3:#bbb;--green:#4a6741;--green-bg:#f2f6ee;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;}
#loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
.spinner{width:28px;height:28px;border:2px solid #e8e4de;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#login-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#login-screen.show{display:flex;}
.login-card{background:#fff;border-radius:18px;padding:44px 40px;width:360px;text-align:center;border:0.5px solid var(--border);}
.login-logo{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:0.1em;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text3);letter-spacing:0.08em;margin-bottom:28px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:0.5px solid var(--border);border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);}
.login-btn:hover{background:var(--bg);}
.login-btn img{width:18px;height:18px;}
#denied-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
#denied-screen.show{display:flex;}
.app{display:none;flex-direction:column;min-height:100vh;}
.app.ready{display:flex;}
.btn-sm{padding:4px 10px;border:0.5px solid var(--border);border-radius:7px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2);}
.btn-sm:hover{background:var(--bg);}
.content{padding:20px;flex:1;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{padding:6px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;width:200px;outline:none;background:#fff;}
.search-box:focus{border-color:#888;}
.tag-filter{display:flex;gap:6px;}
.tag-btn{padding:4px 12px;border:0.5px solid var(--border);border-radius:999px;font-size:11px;cursor:pointer;background:#fff;color:var(--text2);}
.tag-btn.active-all{background:var(--text);color:#fff;border-color:var(--text);}
.tag-btn.active-good{background:#edf5f0;color:#2d6a4f;border-color:#b5d4b8;}
.tag-btn.active-normal{background:#f7f5f2;color:#888;border-color:var(--border);}
.tag-btn.active-warn{background:#fdf0f0;color:#b94040;border-color:#e8c8c8;}
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.customer-card{background:#fff;border-radius:12px;border:0.5px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.customer-card:hover{border-color:#888;}
.card-top{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border2);}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:400;color:var(--text2);flex-shrink:0;border:0.5px solid var(--border);}
.customer-name{font-family:var(--serif);font-size:14px;font-weight:400;letter-spacing:0.02em;margin-bottom:2px;}
.customer-contact{font-size:11px;color:var(--text2);}
.customer-tag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;letter-spacing:0.03em;margin-left:auto;flex-shrink:0;}
.tag-good{background:#edf5f0;color:#2d6a4f;}
.tag-normal{background:#f7f5f2;color:#888;}
.tag-warn{background:#fdf0f0;color:#b94040;}
.card-stats{padding:10px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-bottom:0.5px solid var(--border2);}
.stat-item{text-align:center;}
.stat-label{font-size:9px;color:var(--text3);letter-spacing:0.04em;margin-bottom:2px;}
.stat-val{font-size:13px;font-weight:500;color:var(--text);}
.card-bottom{padding:10px 16px;font-size:11px;color:var(--text2);line-height:1.6;}
.detail-panel{background:#fff;border-radius:12px;border:0.5px solid var(--border);padding:20px;margin-bottom:20px;display:none;}
.detail-panel.open{display:block;}
.detail-.detail-avatar{width:52px;height:52px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:400;color:var(--text2);border:0.5px solid var(--border);}
.detail-name{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:0.04em;margin-bottom:4px;}
.detail-sub{font-size:12px;color:var(--text2);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.kpi{background:var(--bg);border-radius:8px;padding:12px;text-align:center;}
.kpi-label{font-size:10px;color:var(--text3);letter-spacing:0.04em;margin-bottom:4px;}
.kpi-val{font-size:18px;font-weight:500;color:var(--text);}
.section-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:14px 0 8px;padding-bottom:5px;border-bottom:0.5px solid var(--border2);}
.history-item{padding:8px 0;border-bottom:0.5px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;}
.history-item:last-child{border-bottom:none;}
.history-date{color:var(--text2);font-size:11px;margin-top:2px;}
.history-amount{font-weight:500;color:#3a6ab0;}
.memo-area{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;resize:vertical;min-height:72px;outline:none;font-family:var(--sans);color:var(--text);background:#fafaf8;}
.memo-area:focus{border-color:#888;background:#fff;}
.ai-section{background:var(--bg);border-radius:10px;padding:14px;margin-top:12px;}
.ai-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-result{font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap;}
.ai-result.loading{color:var(--text3);font-style:italic;}
.btn{padding:6px 14px;border:0.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);font-size:12px;cursor:pointer;}
.btn:hover{background:var(--bg);}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn.primary:hover{background:#333;}
.btn.green{background:var(--green-bg);color:var(--green);border-color:#c8d4b8;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:999px;font-size:11px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:2000;}
.toast.show{opacity:1;}
  body{padding-bottom:70px;}
.bottom-nav-item.active{color:#1a1a1a;}

@media(max-width:768px){
  .nav-pill{display:none!important;}

}

@media(max-width:768px){.nav-pill{display:none!important;}body{padding-bottom:70px;}}
@media(min-width:769px){.bottom-nav{display:none;}}
header{background:#fff;border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;}
header h1{font-family:var(--serif);font-size:15px;font-weight:400;letter-spacing:0.06em;color:var(--text);flex:1;}

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyAedMeGyuaKI7QJVe3vDAHazyp6SX1ouFw",authDomain:"umas-booking-manager.firebaseapp.com",projectId:"umas-booking-manager",storageBucket:"umas-booking-manager.firebasestorage.app",messagingSenderId:"7381346891",appId:"1:7381346891:web:2affb529e6b8614f6b7bce"};
const ALLOWED=["key8745@gmail.com","princessangel45@gmail.com"];
const fbApp=getApps().length?getApp():initializeApp(firebaseConfig);
const db=getFirestore(fbApp);
const auth=getAuth(fbApp);
const provider=new GoogleAuthProvider();

let bookings=[], customerMemos={}, currentFilter='all', currentCustomer=null, unsubscribe=null;

// 從訂單彙整客戶資料
function buildCustomers(){
  const map={};
  bookings.forEach(b=>{
    if(!b.name) return;
    const key=b.phone||b.name;
    if(!map[key]){
      map[key]={
        key, name:b.name, phone:b.phone||'', line:b.line||'', fb:b.fb||'',
        orders:[], totalRevenue:0, totalDue:0, types:new Set()
      };
    }
    map[key].orders.push(b);
    map[key].totalRevenue+=parseFloat(b.quote)||0;
    map[key].totalDue+=parseFloat(b.due)||0;
    if(b.guesttype) map[key].types.add(b.guesttype);
  });
  // 加入手動新增的客戶（沒有訂單的）
  Object.entries(customerMemos).forEach(([key,memo])=>{
    if(memo.isManual && !map[key]){
      map[key]={
        key, name:memo.name||key, phone:memo.phone||'', line:memo.line||'', fb:memo.fb||'',
        orders:[], totalRevenue:0, totalDue:0, types:new Set()
      };
    }
  });
  return Object.values(map).sort((a,b)=>b.orders.length-a.orders.length);
}

function getMemo(key){ return customerMemos[key]||{}; }

function tagColor(tag){
  if(tag==='好客人') return 'tag-good';
  if(tag==='需注意') return 'tag-warn';
  return 'tag-normal';
}

function fmtDate(d){ if(!d)return'—'; return new Date(d+'T00:00').toLocaleDateString('zh-TW',{year:'numeric',month:'numeric',day:'numeric'}); }

function initials(name){ return name?name.slice(0,1):'?'; }

let searchQ='';
window.filterCustomers=()=>{ searchQ=document.getElementById('searchInput').value.toLowerCase(); renderList(); };
window.setFilter=(f)=>{
  currentFilter=f;
  document.querySelectorAll('.tag-btn').forEach(b=>{ b.className='tag-btn'; });
  const map={'all':'active-all','好客人':'active-good','普通':'active-normal','需注意':'active-warn'};
  document.getElementById('filter-'+( f==='all'?'all':f==='好客人'?'good':f==='普通'?'normal':'warn')).classList.add(map[f]);
  renderList();
};

function renderList(){
  const customers=buildCustomers();
  const filtered=customers.filter(c=>{
    const memo=getMemo(c.key);
    const tag=memo.tag||'普通';
    if(currentFilter!=='all'&&tag!==currentFilter) return false;
    if(searchQ&&!(c.name+c.phone+c.line).toLowerCase().includes(searchQ)) return false;
    return true;
  });
  document.getElementById('customerCount').textContent=`共 ${filtered.length} 位客戶`;
  const grid=document.getElementById('customersGrid');
  grid.innerHTML=filtered.map(c=>{
    const memo=getMemo(c.key);
    const tag=memo.tag||'普通';
    const lastOrder=c.orders.sort((a,b)=>(b.checkin||'').localeCompare(a.checkin||''))[0];
    const rooms=[...new Set(c.orders.flatMap(o=>Array.isArray(o.roomtype)?o.roomtype:(o.roomtype?[o.roomtype]:[])))].slice(0,2).join('、');
    return `<div class="customer-card" onclick="openDetail('${c.key}')">
      <div class="card-top">
        <div class="avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="customer-name">${c.name}</div>
          <div class="customer-contact">${c.phone||''}${c.line?' · Line: '+c.line:''}</div>
        </div>
        <span class="customer-tag ${tagColor(tag)}">${tag==='好客人'?'⭐ ':tag==='需注意'?'⚠ ':''}${tag}</span>
      </div>
      <div class="card-stats">
        <div class="stat-item"><div class="stat-label">訂房次數</div><div class="stat-val">${c.orders.length}</div></div>
        <div class="stat-item"><div class="stat-label">總消費</div><div class="stat-val" style="font-size:11px;">NT$${Math.round(c.totalRevenue).toLocaleString()}</div></div>
        <div class="stat-item"><div class="stat-label">未收尾款</div><div class="stat-val" style="font-size:11px;color:${c.totalDue>0?'#b94040':'#2d6a4f'};">NT$${Math.round(c.totalDue).toLocaleString()}</div></div>
      </div>
      <div class="card-bottom">
        ${rooms?`常訂：${rooms} · `:''}最近入住：${fmtDate(lastOrder?.checkin)}
        ${memo.note?`<div style="margin-top:4px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">備忘：${memo.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.openDetail=function(key){
  const customers=buildCustomers();
  const c=customers.find(x=>x.key===key);
  if(!c) return;
  currentCustomer=c;
  const memo=getMemo(key);
  const panel=document.getElementById('detailPanel');
  const tag=memo.tag||'普通';
  const sortedOrders=[...c.orders].sort((a,b)=>(b.checkin||'').localeCompare(a.checkin||''));
  const rooms=[...new Set(c.orders.flatMap(o=>Array.isArray(o.roomtype)?o.roomtype:(o.roomtype?[o.roomtype]:[])))].join('、');
  const types=[...c.types].join('、');

  // 季節偏好分析
  const seasonMap={spring:0,summer:0,autumn:0,winter:0};
  const seasonLabel={spring:'春（3-5月）',summer:'夏（6-8月）',autumn:'秋（9-11月）',winter:'冬（12-2月）'};
  c.orders.forEach(o=>{
    if(!o.checkin) return;
    const m=parseInt(o.checkin.slice(5,7));
    if(m>=3&&m<=5) seasonMap.spring++;
    else if(m>=6&&m<=8) seasonMap.summer++;
    else if(m>=9&&m<=11) seasonMap.autumn++;
    else seasonMap.winter++;
  });
  const topSeason=Object.entries(seasonMap).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);
  const seasonHtml=topSeason.length>0?topSeason.map(([s,n])=>`<span style="background:var(--bg);border:0.5px solid var(--border);border-radius:999px;padding:2px 8px;font-size:10px;margin-right:4px;">${seasonLabel[s]} ${n}次</span>`).join(''):'尚無資料';

  panel.innerHTML=`
    <div class="detail-header">
      <div class="detail-avatar">${initials(c.name)}</div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="detail-name">${c.name}</div>
          <span class="customer-tag ${tagColor(tag)}">${tag==='好客人'?'⭐ ':tag==='需注意'?'⚠ ':''}${tag}</span>
        </div>
        <div class="detail-sub">${c.phone||''}${c.line?' · Line: '+c.line:''}${c.fb?' · FB: '+c.fb:''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn" style="background:#f2f6ee;color:#4a6741;border-color:#c8d4b8;" onclick="newOrderFromCustomer('${key}')">＋ 新增訂房</button>
        <button class="btn green" onclick="analyzeCustomer('${key}')">🤖 AI 分析</button>
        <button class="btn" onclick="closeDetail()">關閉</button>
      </div>
    </div>
    <div class="detail-grid">
      <div class="kpi"><div class="kpi-label">訂房次數</div><div class="kpi-val">${c.orders.length}</div></div>
      <div class="kpi"><div class="kpi-label">總消費</div><div class="kpi-val" style="font-size:14px;">NT$${Math.round(c.totalRevenue).toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-label">平均消費</div><div class="kpi-val" style="font-size:14px;">NT$${Math.round(c.totalRevenue/(c.orders.length||1)).toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-label">未收尾款</div><div class="kpi-val" style="font-size:14px;color:${c.totalDue>0?'#b94040':'#2d6a4f'};">NT$${Math.round(c.totalDue).toLocaleString()}</div></div>
    </div>

    <div class="section-title">基本資料 <button class="btn" style="font-size:10px;padding:2px 8px;margin-left:8px;" onclick="toggleEditInfo('${key}')">編輯</button></div>
    <div id="info-view-${key}" style="font-size:12px;color:var(--text2);line-height:2;padding:8px 0;">
      ${types?`<span style="margin-right:16px;">類型：${types}</span>`:''}
      ${memo.idno?`<span style="margin-right:16px;">身分證：${memo.idno}</span>`:''}
      ${memo.address?`<div>地址：${memo.address}</div>`:''}
      ${!memo.idno&&!memo.address?'<span style="color:var(--text3);">尚未填寫身分證字號和地址</span>':''}
    </div>
    <div id="info-edit-${key}" style="display:none;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">姓名</div><input id="edit-name-${key}" value="${c.name||''}" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">電話</div><input id="edit-phone-${key}" value="${c.phone||''}" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">Line ID</div><input id="edit-line-${key}" value="${c.line||''}" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">Facebook</div><input id="edit-fb-${key}" value="${c.fb||''}" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">身分證字號</div><input id="edit-idno-${key}" value="${memo.idno||''}" placeholder="A123456789" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
        <div><div style="font-size:10px;color:var(--text2);margin-bottom:3px;">居住地址</div><input id="edit-address-${key}" value="${memo.address||''}" style="width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;outline:none;"></div>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end;">
        <button class="btn" onclick="toggleEditInfo('${key}')">取消</button>
        <button class="btn primary" onclick="saveCustomerInfo('${key}')">儲存</button>
      </div>
    </div>

    <div class="section-title">入住季節偏好</div>
    <div style="padding:6px 0 10px;">${seasonHtml}</div>
    ${types?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px;">常訂房型：${rooms||'—'}</div>`:''}

    <div class="section-title">訂房歷史</div>
    <div id="detail-orders">
      ${sortedOrders.map(o=>{
        const rms=Array.isArray(o.roomtype)?o.roomtype.join('、'):(o.roomtype||'—');
        return `<div class="history-item">
          <div>
            <div style="font-weight:500;">${rms} · ${o.pax||1}人</div>
            <div class="history-date">${fmtDate(o.checkin)} → ${fmtDate(o.checkout||'')} · ${o.nights||1}晚</div>
            ${o.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px;">${o.note}</div>`:''}
          </div>
          <div class="history-amount">NT$${(parseFloat(o.quote)||0).toLocaleString()}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">客戶備忘錄</div>
    <textarea class="memo-area" id="memo-note" placeholder="記錄這位客人的習性、偏好、注意事項...">${memo.note||''}</textarea>
    <div style="display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--text2);">標記：</span>
      <button class="btn" style="font-size:11px;${tag==='好客人'?'background:#edf5f0;color:#2d6a4f;border-color:#b5d4b8;':''}" onclick="setTag('${key}','好客人')">⭐ 好客人</button>
      <button class="btn" style="font-size:11px;${tag==='普通'?'background:#f7f5f2;color:#888;':''}" onclick="setTag('${key}','普通')">普通</button>
      <button class="btn" style="font-size:11px;${tag==='需注意'?'background:#fdf0f0;color:#b94040;border-color:#e8c8c8;':''}" onclick="setTag('${key}','需注意')">⚠ 需注意</button>
      <button class="btn primary" style="margin-left:auto;" onclick="saveMemo('${key}')">儲存備忘</button>
    </div>

    <div class="ai-section">
      <div class="ai-title">🤖 AI 客戶分析 <span style="font-size:10px;color:var(--text3);">點「AI 分析」按鈕產生</span></div>
      <div class="ai-result" id="ai-customer-result">${memo.aiAnalysis||'尚未分析'}</div>
    </div>`;

  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
};

window.toggleEditInfo=function(key){
  const view=document.getElementById(`info-view-${key}`);
  const edit=document.getElementById(`info-edit-${key}`);
  if(!view||!edit) return;
  const isEdit=edit.style.display!=='none';
  view.style.display=isEdit?'block':'none';
  edit.style.display=isEdit?'none':'block';
};

window.saveCustomerInfo=async function(key){
  const memo=getMemo(key);
  memo.idno=document.getElementById(`edit-idno-${key}`)?.value||'';
  memo.address=document.getElementById(`edit-address-${key}`)?.value||'';
  customerMemos[key]=memo;
  await setDoc(doc(db,'customer_memos',key),memo);
  showToast('基本資料已儲存');
  openDetail(key);
};

window.newOrderFromCustomer=function(key){
  const c=buildCustomers().find(x=>x.key===key);
  if(!c) return;
  // 把客戶資料存到 localStorage 暫存，跳到主控板
  sessionStorage.setItem('prefillCustomer',JSON.stringify({
    name:c.name, phone:c.phone, line:c.line||'', fb:c.fb||''
  }));
  window.location.href='index.html?newOrder=1';
};

window.openNewCustomerModal=function(){
  document.getElementById('newCustomerBg').style.display='flex';
  document.getElementById('nc-name').focus();
};
window.closeNewCustomerModal=function(){
  document.getElementById('newCustomerBg').style.display='none';
  ['nc-name','nc-phone','nc-line','nc-fb','nc-idno','nc-address','nc-note'].forEach(id=>{
    document.getElementById(id).value='';
  });
};
window.saveNewCustomer=async function(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){alert('請填寫姓名');return;}
  const phone=document.getElementById('nc-phone').value.trim();
  const key=phone||name;
  const memo={
    name, phone, line:document.getElementById('nc-line').value.trim(),
    fb:document.getElementById('nc-fb').value.trim(),
    idno:document.getElementById('nc-idno').value.trim(),
    address:document.getElementById('nc-address').value.trim(),
    note:document.getElementById('nc-note').value.trim(),
    tag:'普通', isManual:true, createdAt:new Date().toISOString()
  };
  customerMemos[key]=memo;
  await setDoc(doc(db,'customer_memos',key),memo);
  closeNewCustomerModal();
  showToast('客戶資料已新增 ✓');
  renderList();
};

window.closeDetail=function(){
  document.getElementById('detailPanel').classList.remove('open');
  currentCustomer=null;
};

window.setTag=async function(key,tag){
  const memo=getMemo(key);
  memo.tag=tag;
  customerMemos[key]=memo;
  await setDoc(doc(db,'customer_memos',key),memo);
  if(currentCustomer?.key===key) openDetail(key);
  renderList();
  showToast('已標記為「'+tag+'」');
};

window.saveMemo=async function(key){
  const note=document.getElementById('memo-note')?.value||'';
  const memo=getMemo(key);
  memo.note=note;
  customerMemos[key]=memo;
  await setDoc(doc(db,'customer_memos',key),memo);
  renderList();
  showToast('備忘已儲存');
};

window.analyzeCustomer=async function(key){
  const c=buildCustomers().find(x=>x.key===key);
  if(!c) return;
  const memo=getMemo(key);
  const resultEl=document.getElementById('ai-customer-result');
  if(!resultEl) return;
  resultEl.className='ai-result loading';
  resultEl.textContent='AI 分析中，請稍候...';

  const orderSummary=c.orders.sort((a,b)=>(b.checkin||'').localeCompare(a.checkin||'')).map(o=>{
    const rms=Array.isArray(o.roomtype)?o.roomtype.join('、'):(o.roomtype||'—');
    return `- ${fmtDate(o.checkin)} ${rms} ${o.pax||1}人 NT$${o.quote||0} 狀態:${o.status}${o.note?' 備註:'+o.note:''}`;
  }).join('\n');

  try{
    const res=await fetch('/.netlify/functions/ai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'gemini-2.5-flash',
        max_tokens:800,
        system:`你是兀瑪斯農莊的客戶關係顧問。請根據客戶的訂房歷史和備忘錄，用繁體中文分析這位客人，提供以下內容：
1. 消費習性分析（幾月常來、喜歡什麼房型、人數特徵）
2. 客戶價值評估（高價值/一般/需觀察）
3. 接待建議（怎麼跟他打招呼、聊什麼話題、注意什麼）
4. 行銷機會（何時主動聯繫、推薦什麼方案）
回覆簡潔有重點，每項2-3句話。`,
        messages:[{role:'user',content:`客戶：${c.name}\n電話：${c.phone}\n訂房記錄：\n${orderSummary}\n備忘錄：${memo.note||'無'}`}]
      })
    });
    console.log('AI status:', res.status, res.url);
    if(!res.ok){const errText=await res.text();console.log('AI error body:', errText);throw new Error(`HTTP ${res.status}: ${errText}`);}
    const data=await res.json();
    const text=data.content?.[0]?.text||'無法取得分析結果';
    resultEl.className='ai-result';
    resultEl.innerHTML=text.replace(/\n/g,'<br>');
    memo.aiAnalysis=text;
    customerMemos[key]=memo;
    await setDoc(doc(db,'customer_memos',key),memo);
    showToast('AI 分析完成');
  }catch(e){
    resultEl.className='ai-result';
    resultEl.textContent='錯誤：'+e.message;
  }
};

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Auth
document.getElementById('loginBtn').addEventListener('click',async()=>{
  try{await signInWithPopup(auth,provider);}catch(e){if(e.code!=='auth/popup-closed-by-user')alert('登入失敗：'+e.message);}
});
async function doLogout(){if(unsubscribe){unsubscribe();unsubscribe=null;}await signOut(auth);}
document.getElementById('logoutBtn').addEventListener('click',doLogout);
document.getElementById('logoutDeniedBtn').addEventListener('click',doLogout);

onAuthStateChanged(auth,async user=>{
  document.getElementById('loading-screen').style.display='none';
  if(!user){document.getElementById('login-screen').classList.add('show');document.getElementById('app').classList.remove('ready');return;}
  if(!ALLOWED.includes(user.email)){document.getElementById('login-screen').classList.remove('show');document.getElementById('denied-screen').classList.add('show');document.getElementById('app').classList.remove('ready');return;}
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('denied-screen').classList.remove('show');
  document.getElementById('app').classList.add('ready');
  document.getElementById('userAvatar').src=user.photoURL||'';

  // 載入備忘錄
  const memosSnap=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(m=>m.getDocs(m.collection(db,'customer_memos')));
  memosSnap.forEach(d=>{ customerMemos[d.id]={...d.data()}; });

  if(unsubscribe) unsubscribe();
  unsubscribe=onSnapshot(query(collection(db,'bookings')),snapshot=>{
    bookings=snapshot.docs.map(d=>{
      const b={firestoreId:d.id,...d.data()};
      if(b.checkin) b.checkin=b.checkin.toString().replace(/\//g,'-').slice(0,10);
      if(b.checkout) b.checkout=b.checkout.toString().replace(/\//g,'-').slice(0,10);
      return b;
    });
    renderList();
  });
});
</script>
